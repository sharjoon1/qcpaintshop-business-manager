<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1A2535">
  <title>Catalogue · Project Engineer Portal · Quality Colours</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/engineer-portal.css">
  <style>
    .cat-toolbar { display: grid; grid-template-columns: 1.4fr 1fr 1fr auto; gap: 10px; align-items: end; margin-bottom: 16px; padding: 14px 16px; background: var(--ep-panel); border: 1px solid var(--ep-border); border-radius: var(--ep-radius); }
    @media (max-width: 720px) { .cat-toolbar { grid-template-columns: 1fr; } }
    .cat-toolbar label { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; color: var(--ep-muted); text-transform: uppercase; margin-bottom: 4px; display: block; }
    .cat-toolbar input, .cat-toolbar select { width: 100%; padding: 8px 10px; border: 1px solid var(--ep-border); border-radius: var(--ep-radius-sm); font-size: 13px; color: var(--ep-ink); }
    .cat-toolbar input:focus, .cat-toolbar select:focus { outline: none; border-color: var(--ep-active); box-shadow: 0 0 0 3px rgba(37,99,235,0.10); }
    .cat-meta { font-size: 12px; color: var(--ep-muted); padding-bottom: 8px; }

    .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .cat-card { background: var(--ep-panel); border: 1px solid var(--ep-border); border-radius: var(--ep-radius); overflow: hidden; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s; }
    .cat-card:hover { border-color: var(--ep-active); box-shadow: 0 8px 20px rgba(0,0,0,0.04); transform: translateY(-1px); }
    .cat-img { aspect-ratio: 4/3; background: #F3F4F6; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .cat-img img { width: 100%; height: 100%; object-fit: cover; }
    .cat-img .fallback { font-size: 22px; color: rgba(17,24,39,0.20); font-weight: 700; padding: 0 20px; text-align: center; letter-spacing: -0.5px; }
    .cat-disc-tag { position: absolute; top: 8px; left: 8px; background: var(--ep-green-2); color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 3px; }
    .cat-body { padding: 12px 14px 14px; }
    .cat-brand { font-size: 9.5px; font-weight: 700; color: var(--ep-muted); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 4px; }
    .cat-name { font-size: 13.5px; font-weight: 600; color: var(--ep-ink); line-height: 1.3; margin: 0 0 8px; min-height: 36px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .cat-price-row { display: flex; align-items: baseline; gap: 8px; }
    .cat-price-now { font-size: 15px; font-weight: 700; color: var(--ep-ink); font-feature-settings: "tnum"; }
    .cat-price-now.is-disc { color: var(--ep-green); }
    .cat-price-was { font-size: 11.5px; color: var(--ep-muted); text-decoration: line-through; }
    .cat-variants { font-size: 11px; color: var(--ep-muted); margin-top: 6px; }

    /* Modal */
    .cat-modal { position: fixed; inset: 0; background: rgba(15,23,42,0.55); z-index: 90; display: none; align-items: center; justify-content: center; padding: 24px; }
    .cat-modal.is-open { display: flex; }
    .cat-modal-card { background: var(--ep-panel); width: 100%; max-width: 760px; max-height: 90vh; overflow-y: auto; border-radius: var(--ep-radius); }
    .cat-modal-head { display: flex; justify-content: space-between; align-items: start; padding: 20px 24px 16px; border-bottom: 1px solid var(--ep-border); gap: 20px; }
    .cat-modal-head h2 { font-size: 18px; font-weight: 600; margin: 4px 0 0; }
    .cat-modal-head .meta { font-size: 10px; font-weight: 700; color: var(--ep-muted); letter-spacing: 1.3px; text-transform: uppercase; }
    .cat-modal-body { padding: 20px 24px 24px; }
  </style>
</head>
<body data-page="catalog">
  <div class="ep-shell" id="epShell">
    <div id="epRailMount"></div>

    <main class="ep-main">
      <button class="ep-rail-mobile-btn" id="epRailMobileBtn" type="button" aria-label="Open menu" style="margin-bottom:12px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

      <div class="ep-crumb">
        <a href="/engineer-dashboard.html">Home</a>
        <span class="sep">/</span>
        <b>Product Catalogue</b>
      </div>

      <header class="ep-pagehead">
        <div>
          <h1 class="ep-pagehead-title">Product Catalogue &amp; Engineer Prices</h1>
          <div class="ep-pagehead-sub">
            Authorised distributor — Asian Paints, Berger, Birla Opus, Nippon, Jotun, JSW.
            Prices reflect your contracted engineer discount, where applicable.
          </div>
        </div>
        <div class="ep-pagehead-actions">
          <a href="/engineer-new-quote.html" class="ep-btn primary">Submit Quotation Request</a>
        </div>
      </header>

      <!-- Toolbar -->
      <div class="cat-toolbar">
        <div><label>Search</label><input id="qSearch" type="search" placeholder="Search by name, brand, item code..."></div>
        <div><label>Brand</label><select id="qBrand"><option value="">All brands</option></select></div>
        <div><label>Category</label><select id="qCategory"><option value="">All categories</option></select></div>
        <div style="display:flex;align-items:flex-end;height:100%;"><span class="cat-meta" id="qMeta">Loading…</span></div>
      </div>

      <!-- Grid -->
      <div class="cat-grid" id="qGrid">
        <div class="cat-card ep-skel" style="height: 280px;"></div>
        <div class="cat-card ep-skel" style="height: 280px;"></div>
        <div class="cat-card ep-skel" style="height: 280px;"></div>
        <div class="cat-card ep-skel" style="height: 280px;"></div>
      </div>

      <div class="ep-pager" id="qPager" style="display:none; margin-top: 18px; background: var(--ep-panel); border: 1px solid var(--ep-border); border-top: 1px solid var(--ep-border); border-radius: var(--ep-radius);">
        <span class="cat-meta" id="qPageInfo"></span>
        <div class="ep-pager-tools">
          <button class="ep-btn outline" id="qPrev" type="button">← Previous</button>
          <button class="ep-btn outline" id="qNext" type="button">Next →</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="cat-modal" id="dModal">
    <div class="cat-modal-card">
      <div class="cat-modal-head">
        <div>
          <div class="meta" id="dMeta"></div>
          <h2 id="dName">Loading…</h2>
        </div>
        <button class="ep-btn outline" id="dClose" type="button">Close</button>
      </div>
      <div class="cat-modal-body" id="dBody"></div>
    </div>
  </div>

  <script src="/js/engineer-portal.js"></script>
  <script>
    (function () {
      var state = { page: 1, limit: 24, total: 0, search: '', brand: '', category: '' };

      async function loadFilters() {
        try {
          var r = await fetch(EP.API_BASE + '/me/catalog-filters', { headers: EP.authHeaders() });
          if (EP.handleAuthFail(r)) return;
          var data = await r.json();
          if (!data.success) return;
          var b = document.getElementById('qBrand');
          var c = document.getElementById('qCategory');
          (data.brands || []).forEach(function (br) {
            var o = document.createElement('option'); o.value = br; o.textContent = br; b.appendChild(o);
          });
          (data.categories || []).forEach(function (cat) {
            var o = document.createElement('option'); o.value = cat; o.textContent = cat; c.appendChild(o);
          });
        } catch (e) { console.error(e); }
      }

      async function loadCatalog() {
        var grid = document.getElementById('qGrid');
        var meta = document.getElementById('qMeta');
        meta.textContent = 'Loading…';
        try {
          var params = new URLSearchParams();
          params.set('page', state.page);
          params.set('limit', state.limit);
          if (state.search) params.set('search', state.search);
          if (state.brand) params.set('brand', state.brand);
          if (state.category) params.set('category', state.category);
          var r = await fetch(EP.API_BASE + '/me/catalog?' + params.toString(), { headers: EP.authHeaders() });
          if (EP.handleAuthFail(r)) return;
          var data = await r.json();
          if (!data.success) throw new Error(data.message || 'Failed');
          state.total = data.total || 0;

          if (!data.products.length) {
            grid.innerHTML = '<div style="grid-column:1/-1;background:var(--ep-panel);border:1px solid var(--ep-border);border-radius:var(--ep-radius);"><div class="ep-empty"><div class="ep-empty-mark">No Match</div><h3>No products match this filter</h3><p>Adjust your search or filter selection.</p></div></div>';
            meta.textContent = '0 products';
            document.getElementById('qPager').style.display = 'none';
            return;
          }

          grid.innerHTML = data.products.map(function (p) {
            var hasDisc = p.discount_pct && p.discount_pct > 0;
            var listMin = parseFloat(p.list_min || 0), listMax = parseFloat(p.list_max || 0);
            var effMin = parseFloat(p.effective_min || 0), effMax = parseFloat(p.effective_max || 0);
            var listRange = listMin === listMax ? EP.fmtINR(listMin) : EP.fmtINR(listMin) + '–' + EP.fmtINR(listMax, false);
            var effRange  = effMin === effMax ? EP.fmtINR(effMin) : EP.fmtINR(effMin) + '–' + EP.fmtINR(effMax, false);
            var img = p.image_url
              ? '<img src="' + EP.escapeHTML(p.image_url) + '" alt="" loading="lazy">'
              : '<div class="fallback">' + EP.escapeHTML(p.name).slice(0, 28) + '</div>';
            var disc = hasDisc ? '<div class="cat-disc-tag">' + p.discount_pct + '% OFF</div>' : '';
            return '<article class="cat-card" onclick="openDetail(' + p.product_id + ')">'
              + '<div class="cat-img">' + img + disc + '</div>'
              + '<div class="cat-body">'
              +   (p.brand ? '<div class="cat-brand">' + EP.escapeHTML(p.brand) + '</div>' : '')
              +   '<h3 class="cat-name">' + EP.escapeHTML(p.name) + '</h3>'
              +   '<div class="cat-price-row">'
              +     '<span class="cat-price-now' + (hasDisc ? ' is-disc' : '') + '">' + effRange + '</span>'
              +     (hasDisc ? '<span class="cat-price-was">' + listRange + '</span>' : '')
              +   '</div>'
              +   '<div class="cat-variants">' + (p.variant_count || 0) + ' pack size' + (p.variant_count === 1 ? '' : 's') + '</div>'
              + '</div></article>';
          }).join('');

          meta.textContent = state.total + ' product' + (state.total === 1 ? '' : 's');
          var pages = Math.max(1, Math.ceil(state.total / state.limit));
          var pager = document.getElementById('qPager');
          if (pages > 1) {
            pager.style.display = 'flex';
            document.getElementById('qPageInfo').textContent = 'Page ' + state.page + ' of ' + pages + ' · ' + state.total + ' products';
            document.getElementById('qPrev').disabled = state.page <= 1;
            document.getElementById('qNext').disabled = state.page >= pages;
          } else {
            pager.style.display = 'none';
          }
        } catch (e) {
          console.error(e);
          grid.innerHTML = '<div style="grid-column:1/-1;"><div class="ep-empty"><p>Unable to load catalogue. Please refresh.</p></div></div>';
          meta.textContent = '';
        }
      }

      window.openDetail = async function (id) {
        var modal = document.getElementById('dModal');
        var body = document.getElementById('dBody');
        document.getElementById('dName').textContent = 'Loading…';
        document.getElementById('dMeta').textContent = '';
        body.innerHTML = '<div class="ep-skel" style="height:200px"></div>';
        modal.classList.add('is-open');
        try {
          var r = await fetch(EP.API_BASE + '/me/catalog/' + id, { headers: EP.authHeaders() });
          if (EP.handleAuthFail(r)) return;
          var data = await r.json();
          if (!data.success) throw new Error(data.message || 'Not found');
          var p = data.product;
          var v = data.variants || [];
          document.getElementById('dName').textContent = p.name;
          var brand = v.length ? v[0].brand : '';
          var cat = v.length ? v[0].category : '';
          document.getElementById('dMeta').textContent = [brand, cat].filter(Boolean).join(' · ');

          var hasDisc = v.some(function (x) { return x.discount_pct > 0; });
          var notice = hasDisc
            ? '<div class="ep-notice ok">Your contracted engineer discount has been applied to the prices shown below.</div>'
            : '<div class="ep-notice warn">No contracted discount on record for these items. Contact your relationship manager to negotiate engineer rates.</div>';

          body.innerHTML = notice + '<table class="ep-table"><thead><tr>'
            + '<th>Item / Pack</th><th>Item Code</th><th class="num">List Price</th><th class="num">Your Price</th><th class="num">Discount</th>'
            + '</tr></thead><tbody>'
            + v.map(function (x) {
              var disc = x.discount_pct > 0;
              var dot = x.color_code ? '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;background:' + EP.escapeHTML(x.color_code) + ';border:1px solid rgba(0,0,0,0.1);vertical-align:middle;"></span>' : '';
              return '<tr>'
                + '<td>' + dot + '<b>' + EP.escapeHTML(x.size_label || x.zoho_item_name || '—') + '</b>' + (x.color_name ? ' <small>' + EP.escapeHTML(x.color_name) + '</small>' : '') + '</td>'
                + '<td class="mono">' + EP.escapeHTML(x.zoho_item_id || '') + '</td>'
                + '<td class="num">' + EP.fmtINR(x.list_rate) + '</td>'
                + '<td class="num"><b>' + EP.fmtINR(x.effective_rate) + '</b></td>'
                + '<td class="num" style="color:' + (disc ? 'var(--ep-green-2)' : 'var(--ep-muted)') + ';font-weight:600;">' + (disc ? x.discount_pct + '%' : '—') + '</td>'
                + '</tr>';
            }).join('')
            + '</tbody></table>'
            + '<p style="font-size:11px;color:var(--ep-muted);margin-top:18px;">Prices exclude GST. For bulk procurement, submit a <a href="/engineer-new-quote.html" style="color:var(--ep-active);font-weight:500;">formal quotation request</a>.</p>';
        } catch (e) {
          body.innerHTML = '<div class="ep-empty"><p>Unable to load product details.</p></div>';
        }
      };

      document.getElementById('dClose').addEventListener('click', function () {
        document.getElementById('dModal').classList.remove('is-open');
      });
      document.getElementById('dModal').addEventListener('click', function (e) {
        if (e.target.id === 'dModal') this.classList.remove('is-open');
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') document.getElementById('dModal').classList.remove('is-open');
      });

      var sTimer;
      document.getElementById('qSearch').addEventListener('input', function (e) {
        clearTimeout(sTimer);
        sTimer = setTimeout(function () { state.search = e.target.value.trim(); state.page = 1; loadCatalog(); }, 280);
      });
      document.getElementById('qBrand').addEventListener('change', function (e) { state.brand = e.target.value; state.page = 1; loadCatalog(); });
      document.getElementById('qCategory').addEventListener('change', function (e) { state.category = e.target.value; state.page = 1; loadCatalog(); });
      document.getElementById('qPrev').addEventListener('click', function () { if (state.page > 1) { state.page--; loadCatalog(); window.scrollTo({ top: 0, behavior: 'smooth' }); } });
      document.getElementById('qNext').addEventListener('click', function () { state.page++; loadCatalog(); window.scrollTo({ top: 0, behavior: 'smooth' }); });

      document.addEventListener('DOMContentLoaded', function () {
        EP.loadMe();
        loadFilters();
        loadCatalog();
      });
    })();
  </script>
</body>
</html>
