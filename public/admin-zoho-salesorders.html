<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Sales Orders - Quality Colours Manager</title>
    <link rel="stylesheet" href="/css/tailwind.css?v=849f1b5c">
    <link rel="stylesheet" href="/css/design-system.css?v=876c7d73">
    <link rel="stylesheet" href="/css/zoho-common.css?v=b2e96640">
    <script src="/universal-nav-loader.js?v=fb16cb40"></script>
    <script src="/js/auth-helper.js?v=7101c516"></script>
    <script src="/js/pages/admin-zoho-salesorders-authguard.js"></script>
    <style>
        /* ─── MOBILE: admin-zoho-salesorders.html ─── */
        @media (max-width: 639px) {
            .container, .p-6 { padding: 12px !important; }
            .flex.justify-between { flex-direction: column !important; gap: 8px !important; }
            table { display: block !important; }
            table thead { display: none !important; }
            table tbody tr {
                display: block !important; background: #fff !important; border-radius: 10px !important;
                margin-bottom: 8px !important; padding: 14px !important;
                box-shadow: 0 1px 4px rgba(0,0,0,0.08) !important; border: 1px solid #e5e7eb !important;
            }
            table td { display: flex !important; justify-content: space-between !important; padding: 4px 0 !important; font-size: 13px !important; border: none !important; border-bottom: 1px solid #f9fafb !important; }
            table td:last-child { border-bottom: none !important; justify-content: flex-end !important; }
            table td:nth-child(2) { font-weight: 600 !important; font-size: 14px !important; }
            [id$="Modal"] > div, .modal-content {
                width: 95vw !important; max-height: 90vh !important; overflow-y: auto !important;
                border-radius: 16px 16px 0 0 !important; margin: 0 !important;
            }
            /* Detail modal: anchored bottom sheet */
            [id*="orderModal"], [id*="salesModal"],
            [id*="orderDetail"], [id*="salesDetail"] {
                position: fixed !important;
                bottom: 0 !important;
                left: 0 !important;
                width: 100% !important;
            }
        }
    </style>
</head>
<body class="bg-gray-50" data-page="zoho-salesorders">
    <div class="container mx-auto p-4 md:p-6">

        <!-- Header -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <div>
                <h2 class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-800">Sales Orders</h2>
                <p class="text-gray-600 mt-1 text-sm">Sales orders from Zoho Books</p>
            </div>
            <button id="btnExportCSV" class="btn btn-secondary flex items-center gap-2 text-sm whitespace-nowrap">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Export CSV
            </button>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
            <div class="bg-white rounded-lg shadow p-4">
                <div class="text-gray-500 text-xs font-semibold uppercase">Total Orders</div>
                <div class="text-xl font-bold text-gray-800 mt-1" id="statTotal">--</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4">
                <div class="text-gray-500 text-xs font-semibold uppercase">Confirmed</div>
                <div class="text-xl font-bold text-blue-600 mt-1" id="statConfirmed">--</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4">
                <div class="text-gray-500 text-xs font-semibold uppercase">Invoiced</div>
                <div class="text-xl font-bold text-green-600 mt-1" id="statInvoiced">--</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4">
                <div class="text-gray-500 text-xs font-semibold uppercase">Total Value</div>
                <div class="text-xl font-bold text-indigo-600 mt-1" id="statValue">--</div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="flex flex-col sm:flex-row gap-2 mb-4 flex-wrap">
            <input type="date" id="fromDate" class="border rounded-lg px-3 py-2 text-sm w-full sm:w-auto">
            <input type="date" id="toDate" class="border rounded-lg px-3 py-2 text-sm w-full sm:w-auto">
            <select id="statusFilter" class="border rounded-lg px-3 py-2 text-sm w-full sm:w-auto">
                <option value="">All Status</option>
                <option value="draft">Draft</option>
                <option value="confirmed">Confirmed</option>
                <option value="invoiced">Invoiced</option>
                <option value="void">Void</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search customer..." class="border rounded-lg px-3 py-2 text-sm w-full sm:w-auto flex-1">
            <button id="btnApplyFilters" class="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700 w-full sm:w-auto">Apply</button>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200 text-xs sm:text-sm" id="soTable">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-3 py-3 text-left font-semibold text-gray-600 whitespace-nowrap">SO #</th>
                            <th class="px-3 py-3 text-left font-semibold text-gray-600 whitespace-nowrap">Date</th>
                            <th class="px-3 py-3 text-left font-semibold text-gray-600 whitespace-nowrap">Customer</th>
                            <th class="px-3 py-3 text-left font-semibold text-gray-600 whitespace-nowrap hidden md:table-cell">Location</th>
                            <th class="px-3 py-3 text-right font-semibold text-gray-600 whitespace-nowrap">Amount</th>
                            <th class="px-3 py-3 text-center font-semibold text-gray-600 whitespace-nowrap">Status</th>
                            <th class="px-3 py-3 text-center font-semibold text-gray-600 whitespace-nowrap hidden sm:table-cell">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100" id="soBody">
                        <tr><td colspan="7" class="text-center py-8 text-gray-400">Loading sales orders...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="px-4 py-3 border-t text-sm text-gray-500" id="soPagination"></div>
        </div>

    </div>

    <!-- SO Detail Modal -->
    <div id="soModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl shadow-xl max-h-[85vh] overflow-y-auto" style="padding-bottom: max(1rem, env(safe-area-inset-bottom));">
            <div class="flex items-center justify-between p-4 border-b sticky top-0 bg-white z-10">
                <h3 class="text-lg font-bold text-gray-800" id="modalSONumber">Sales Order</h3>
                <button id="btnCloseSOModal" class="p-2 rounded-lg hover:bg-gray-100 text-gray-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-4" id="modalContent">
                <div class="text-center py-8 text-gray-400">Loading...</div>
            </div>
        </div>
    </div>

    <script src="/js/pages/admin-zoho-salesorders.js"></script>
</body>
</html>
