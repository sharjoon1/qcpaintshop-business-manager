<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Sales Orders - Quality Colours Manager</title>
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/zoho-common.css">
    <script src="/universal-nav-loader.js"></script>
    <script src="/js/auth-helper.js"></script>
    <script>requireAdminOrRedirect();</script>
    <style>
        /* ─── MOBILE: admin-zoho-salesorders.html ─── */
        @media (max-width: 639px) {
            .container, .p-6 { padding: 12px !important; }
            .flex.justify-between { flex-direction: column !important; gap: 8px !important; }
            table { display: block !important; }
            table thead { display: none !important; }
            table tbody tr {
                display: block !important; background: #fff !important; border-radius: 10px !important;
                margin-bottom: 8px !important; padding: 14px !important;
                box-shadow: 0 1px 4px rgba(0,0,0,0.08) !important; border: 1px solid #e5e7eb !important;
            }
            table td { display: flex !important; justify-content: space-between !important; padding: 4px 0 !important; font-size: 13px !important; border: none !important; border-bottom: 1px solid #f9fafb !important; }
            table td:last-child { border-bottom: none !important; justify-content: flex-end !important; }
            table td:nth-child(2) { font-weight: 600 !important; font-size: 14px !important; }
            [id$="Modal"] > div, .modal-content {
                width: 95vw !important; max-height: 90vh !important; overflow-y: auto !important;
                border-radius: 16px 16px 0 0 !important; margin: 0 !important;
            }
        }
    </style>
</head>
<body class="bg-gray-50" data-page="zoho-salesorders">
    <div class="container mx-auto p-4 md:p-6">

        <!-- Header -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <div>
                <h2 class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-800">Sales Orders</h2>
                <p class="text-gray-600 mt-1 text-sm">Sales orders from Zoho Books</p>
            </div>
            <button onclick="exportCSV()" class="btn btn-secondary flex items-center gap-2 text-sm whitespace-nowrap">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Export CSV
            </button>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
            <div class="bg-white rounded-lg shadow p-4">
                <div class="text-gray-500 text-xs font-semibold uppercase">Total Orders</div>
                <div class="text-xl font-bold text-gray-800 mt-1" id="statTotal">--</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4">
                <div class="text-gray-500 text-xs font-semibold uppercase">Confirmed</div>
                <div class="text-xl font-bold text-blue-600 mt-1" id="statConfirmed">--</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4">
                <div class="text-gray-500 text-xs font-semibold uppercase">Invoiced</div>
                <div class="text-xl font-bold text-green-600 mt-1" id="statInvoiced">--</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4">
                <div class="text-gray-500 text-xs font-semibold uppercase">Total Value</div>
                <div class="text-xl font-bold text-indigo-600 mt-1" id="statValue">--</div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="flex flex-col sm:flex-row gap-2 mb-4 flex-wrap">
            <input type="date" id="fromDate" class="border rounded-lg px-3 py-2 text-sm w-full sm:w-auto">
            <input type="date" id="toDate" class="border rounded-lg px-3 py-2 text-sm w-full sm:w-auto">
            <select id="statusFilter" class="border rounded-lg px-3 py-2 text-sm w-full sm:w-auto">
                <option value="">All Status</option>
                <option value="draft">Draft</option>
                <option value="confirmed">Confirmed</option>
                <option value="invoiced">Invoiced</option>
                <option value="void">Void</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search customer..." class="border rounded-lg px-3 py-2 text-sm w-full sm:w-auto flex-1">
            <button onclick="applyFilters()" class="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700 w-full sm:w-auto">Apply</button>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200 text-xs sm:text-sm" id="soTable">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-3 py-3 text-left font-semibold text-gray-600 whitespace-nowrap">SO #</th>
                            <th class="px-3 py-3 text-left font-semibold text-gray-600 whitespace-nowrap">Date</th>
                            <th class="px-3 py-3 text-left font-semibold text-gray-600 whitespace-nowrap">Customer</th>
                            <th class="px-3 py-3 text-left font-semibold text-gray-600 whitespace-nowrap hidden md:table-cell">Location</th>
                            <th class="px-3 py-3 text-right font-semibold text-gray-600 whitespace-nowrap">Amount</th>
                            <th class="px-3 py-3 text-center font-semibold text-gray-600 whitespace-nowrap">Status</th>
                            <th class="px-3 py-3 text-center font-semibold text-gray-600 whitespace-nowrap hidden sm:table-cell">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100" id="soBody">
                        <tr><td colspan="7" class="text-center py-8 text-gray-400">Loading sales orders...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="px-4 py-3 border-t text-sm text-gray-500" id="soPagination"></div>
        </div>

    </div>

    <!-- SO Detail Modal -->
    <div id="soModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl shadow-xl max-h-[85vh] overflow-y-auto" style="padding-bottom: max(1rem, env(safe-area-inset-bottom));">
            <div class="flex items-center justify-between p-4 border-b sticky top-0 bg-white z-10">
                <h3 class="text-lg font-bold text-gray-800" id="modalSONumber">Sales Order</h3>
                <button onclick="closeSOModal()" class="p-2 rounded-lg hover:bg-gray-100 text-gray-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-4" id="modalContent">
                <div class="text-center py-8 text-gray-400">Loading...</div>
            </div>
        </div>
    </div>

    <script>
    let currentPage = 1;
    let allRows = [];

    function formatCurrency(amount) {
        const n = parseFloat(amount) || 0;
        return '₹' + n.toLocaleString('en-IN', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    function statusBadge(status) {
        const map = {
            confirmed: 'bg-blue-100 text-blue-800',
            draft: 'bg-gray-100 text-gray-600',
            invoiced: 'bg-green-100 text-green-800',
            void: 'bg-red-100 text-red-800'
        };
        const cls = map[(status||'').toLowerCase()] || 'bg-gray-100 text-gray-600';
        return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${cls}">${status || '-'}</span>`;
    }

    function applyFilters() { loadSalesOrders(1); }

    async function loadSalesOrders(page = 1) {
        currentPage = page;
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        const status = document.getElementById('statusFilter').value;
        const search = document.getElementById('searchInput').value;
        let url = `/api/zoho/salesorders?page=${page}&limit=50`;
        if (from) url += `&from_date=${from}`;
        if (to) url += `&to_date=${to}`;
        if (status) url += `&status=${status}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        try {
            const data = await fetch(url, { headers: getAuthHeaders() }).then(r => r.json());
            allRows = data.salesorders || [];
            const tbody = document.getElementById('soBody');
            if (!allRows.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-gray-400">No sales orders found for the selected filters.</td></tr>';
                updateSummaryCards([]);
                return;
            }
            tbody.innerHTML = allRows.map(so => `
                <tr class="hover:bg-gray-50 cursor-pointer" onclick="openSOModal('${so.transaction_id}', '${(so.so_number||'').replace(/'/g,"\\'")}')">
                    <td class="px-3 py-2 font-medium text-indigo-700 whitespace-nowrap">${so.so_number || so.transaction_id || '-'}</td>
                    <td class="px-3 py-2 whitespace-nowrap text-gray-700">${so.date || '-'}</td>
                    <td class="px-3 py-2 text-gray-800 max-w-[140px] truncate">${so.customer_name || '-'}</td>
                    <td class="px-3 py-2 text-gray-500 hidden md:table-cell">${so.location_id || '-'}</td>
                    <td class="px-3 py-2 text-right font-medium text-gray-800">${formatCurrency(so.total)}</td>
                    <td class="px-3 py-2 text-center">${statusBadge(so.status)}</td>
                    <td class="px-3 py-2 text-center hidden sm:table-cell">
                        <button onclick="event.stopPropagation(); openSOModal('${so.transaction_id}', '${(so.so_number||'').replace(/'/g,"\\'")}'); " class="text-xs px-2 py-1 rounded bg-indigo-50 text-indigo-700 hover:bg-indigo-100">View</button>
                    </td>
                </tr>
            `).join('');
            updateSummaryCards(allRows);
            document.getElementById('soPagination').textContent = `${allRows.length} sales orders`;
        } catch (err) {
            document.getElementById('soBody').innerHTML = '<tr><td colspan="7" class="text-center py-6 text-red-500">Failed to load sales orders</td></tr>';
        }
    }

    function updateSummaryCards(rows) {
        document.getElementById('statTotal').textContent = rows.length;
        document.getElementById('statConfirmed').textContent = rows.filter(r => (r.status||'').toLowerCase() === 'confirmed').length;
        document.getElementById('statInvoiced').textContent = rows.filter(r => (r.status||'').toLowerCase() === 'invoiced').length;
        const total = rows.reduce((s, r) => s + parseFloat(r.total || 0), 0);
        document.getElementById('statValue').textContent = formatCurrency(total);
    }

    async function openSOModal(transactionId, soNumber) {
        document.getElementById('soModal').classList.remove('hidden');
        document.getElementById('modalSONumber').textContent = soNumber || transactionId;
        document.getElementById('modalContent').innerHTML = '<div class="text-center py-8 text-gray-400">Loading...</div>';
        try {
            const data = await fetch(`/api/zoho/salesorders/${transactionId}`, { headers: getAuthHeaders() }).then(r => r.json());
            if (!data.success || !data.salesorder) {
                document.getElementById('modalContent').innerHTML = '<p class="text-gray-500 text-center py-4">Could not load sales order details.</p>';
                return;
            }
            const so = data.salesorder;
            const items = so.line_items || [];
            document.getElementById('modalContent').innerHTML = `
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <div><span class="text-gray-500">SO Number</span><br><strong>${so.salesorder_number || '-'}</strong></div>
                        <div><span class="text-gray-500">Date</span><br><strong>${so.date || '-'}</strong></div>
                        <div><span class="text-gray-500">Customer</span><br><strong>${so.customer_name || '-'}</strong></div>
                        <div><span class="text-gray-500">Salesperson</span><br><strong>${so.salesperson_name || '-'}</strong></div>
                    </div>
                    ${items.length ? `
                    <div class="border rounded-lg overflow-hidden">
                        <table class="min-w-full text-xs">
                            <thead class="bg-gray-50"><tr>
                                <th class="px-3 py-2 text-left text-gray-600">Item</th>
                                <th class="px-3 py-2 text-right text-gray-600">Qty</th>
                                <th class="px-3 py-2 text-right text-gray-600">Rate</th>
                                <th class="px-3 py-2 text-right text-gray-600">Amount</th>
                            </tr></thead>
                            <tbody class="divide-y divide-gray-100">
                                ${items.map(it => `<tr>
                                    <td class="px-3 py-2">${it.name || it.item_name || '-'}</td>
                                    <td class="px-3 py-2 text-right">${it.quantity || '-'}</td>
                                    <td class="px-3 py-2 text-right">${formatCurrency(it.rate)}</td>
                                    <td class="px-3 py-2 text-right font-medium">${formatCurrency(it.item_total)}</td>
                                </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>` : '<p class="text-sm text-gray-500">No line items available.</p>'}
                    <div class="flex justify-between items-center pt-2 border-t">
                        <strong class="text-gray-700">Total</strong>
                        <strong class="text-lg text-indigo-700">${formatCurrency(so.total)}</strong>
                    </div>
                    ${so.salesorder_id ? `<a href="https://books.zoho.in/app#salesorders/${so.salesorder_id}" target="_blank" class="block text-center text-sm text-indigo-600 hover:underline mt-2">Open in Zoho &rarr;</a>` : ''}
                </div>
            `;
        } catch (e) {
            document.getElementById('modalContent').innerHTML = '<p class="text-red-500 text-sm text-center py-4">Failed to load details.</p>';
        }
    }

    function closeSOModal() {
        document.getElementById('soModal').classList.add('hidden');
    }

    function exportCSV() {
        if (!allRows.length) { alert('No data to export.'); return; }
        const headers = ['SO Number','Date','Customer','Location','Amount','Status'];
        const rows = allRows.map(so => [
            so.so_number || so.transaction_id || '',
            so.date || '',
            so.customer_name || '',
            so.location_id || '',
            so.total || 0,
            so.status || ''
        ]);
        const csv = [headers, ...rows].map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `sales-orders-${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }

    // Close modal on overlay click
    document.getElementById('soModal').addEventListener('click', function(e) {
        if (e.target === this) closeSOModal();
    });

    // Init
    loadSalesOrders(1);
    </script>
</body>
</html>
