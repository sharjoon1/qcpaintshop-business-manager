<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1B5E3B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Daily Tasks - Quality Colours</title>
    <script src="/js/auth-helper.js?v=7101c516"></script>
    <script src="/js/pages/daily-tasks-authguard.js"></script>
    <link rel="stylesheet" href="/css/tailwind.css?v=849f1b5c">
    <link rel="stylesheet" href="/css/design-system.css?v=876c7d73">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
        }
        .gradient-header {
            background: linear-gradient(135deg, #1B5E3B 0%, #154D31 100%);
            color: white;
            padding: 20px 16px;
            border-radius: 0 0 24px 24px;
        }
        .task-section {
            background: white;
            border-radius: 16px;
            margin: 12px 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6b7280;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f3f4f6;
        }
        .task-item {
            padding: 12px 0;
            border-bottom: 1px solid #f9fafb;
        }
        .task-item:last-child { border-bottom: none; }
        .task-title {
            font-size: 15px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .toggle-group {
            display: flex;
            gap: 8px;
        }
        .toggle-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            border: 2px solid #e5e7eb;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .toggle-btn.yes.active {
            background: #d1fae5;
            border-color: #10b981;
            color: #065f46;
        }
        .toggle-btn.no.active {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        .detail-fields {
            margin-top: 10px;
            display: none;
        }
        .detail-fields.show { display: block; }
        .detail-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 8px;
            outline: none;
        }
        .detail-input:focus { border-color: #1B5E3B; }
        .reason-box {
            margin-top: 10px;
            display: none;
        }
        .reason-box.show { display: block; }
        .photo-section {
            margin-top: 10px;
            display: none;
        }
        .photo-section.show { display: block; }
        .photo-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #eff6ff;
            border: 1px dashed #3b82f6;
            border-radius: 10px;
            color: #2563eb;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            justify-content: center;
        }
        .photo-preview {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .photo-preview img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #e5e7eb;
        }
        .material-list { margin-top: 10px; }
        .material-entry {
            background: #f9fafb;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .add-material-btn {
            width: 100%;
            padding: 10px;
            border: 1px dashed #9ca3af;
            border-radius: 10px;
            background: white;
            color: #6b7280;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .submit-btn {
            width: calc(100% - 32px);
            margin: 16px;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            transition: all 0.3s;
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .submit-btn:active:not(:disabled) { transform: scale(0.98); }
        .progress-ring {
            width: 56px;
            height: 56px;
        }
        .toast-container {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            pointer-events: none;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            animation: toastIn 0.3s ease-out;
            max-width: 90vw;
            text-align: center;
        }
        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
        @keyframes toastIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .completed-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            background: #d1fae5;
            color: #065f46;
        }
    </style>
    <script src="/universal-nav-loader.js?v=fb16cb40"></script>
</head>
<body data-page="daily-tasks">
    <div class="toast-container" id="toastContainer"></div>

    <!-- Header -->
    <div class="gradient-header">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
            <div>
                <h1 style="font-size: 22px; font-weight: 700;">Daily Tasks</h1>
                <p style="font-size: 13px; opacity: 0.85;" id="headerDate">Loading...</p>
            </div>
            <div style="text-align: center;">
                <svg class="progress-ring" viewBox="0 0 56 56">
                    <circle cx="28" cy="28" r="24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
                    <circle id="progressCircle" cx="28" cy="28" r="24" fill="none" stroke="white" stroke-width="4"
                        stroke-dasharray="150.8" stroke-dashoffset="150.8" stroke-linecap="round"
                        transform="rotate(-90 28 28)" style="transition: stroke-dashoffset 0.5s;"/>
                </svg>
                <div style="font-size: 11px; margin-top: 2px; opacity: 0.8;" id="progressText">0/0</div>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loadingState" style="text-align: center; padding: 40px;">
        <div style="border: 3px solid #e5e7eb; border-top: 3px solid #1B5E3B; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
        <p style="color: #6b7280; margin-top: 12px;">Loading tasks...</p>
    </div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <!-- Tasks Container -->
    <div id="tasksContainer" style="display: none;"></div>

    <!-- Submit Button -->
    <button class="submit-btn" id="submitBtn" style="display: none;">
        Submit Daily Report
    </button>

    <!-- Already Submitted -->
    <div id="submittedState" style="display: none; text-align: center; padding: 20px; margin: 16px;">
        <div class="completed-badge" style="font-size: 14px; padding: 8px 16px; margin-bottom: 8px;">
            Submitted Today
        </div>
        <p style="color: #6b7280; font-size: 13px;">Your daily report has been submitted.</p>
    </div>


    <script src="/js/pages/daily-tasks.js"></script>
    <script src="/components/logo-loader.js"></script>
</body>
</html>
