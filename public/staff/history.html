<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1B5E3B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Attendance History - Quality Colours</title>
    <script src="/js/auth-helper.js?v=7101c516"></script>
    <script src="/js/qc-escape.js?v=32133ff2"></script>
    <script src="/js/pages/history-authguard.js"></script>
    <link rel="stylesheet" href="/css/tailwind.css?v=849f1b5c">
    <link rel="stylesheet" href="/css/design-system.css?v=876c7d73">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
            background: linear-gradient(135deg, #1B5E3B 0%, #154D31 100%) !important;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .month-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f9fafb;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .month-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            border: 2px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .month-btn:active {
            transform: scale(0.9);
        }
        .attendance-item {
            padding: 16px;
            background: #f9fafb;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #e5e7eb;
        }
        .attendance-item.complete {
            border-left-color: #10b981;
        }
        .attendance-item.incomplete {
            border-left-color: #f59e0b;
        }
        .attendance-item.late {
            border-left-color: #ef4444;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #f9fafb;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 12px;
            color: #6b7280;
        }
        .loader {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #1B5E3B;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }
    </style>
    <script src="/universal-nav-loader.js?v=6b4a6dbe"></script>
</head>
<body data-page="attendance-history">

    <div class="container">
        <!-- Header -->
        <div class="card" style="margin-top: 16px;">
            <button id="btn-back" style="background: none; border: none; color: #6b7280; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; cursor: pointer;">
                <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Back
            </button>
            <h1 style="font-size: 28px; font-weight: 700; color: #1f2937; margin-bottom: 8px;">Attendance History</h1>
            <p style="color: #6b7280;">View your past attendance records</p>
        </div>

        <!-- Month Selector -->
        <div class="card">
            <div class="month-selector">
                <button class="month-btn" id="btn-prev-month">
                    <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
                <div style="text-align: center;">
                    <div style="font-size: 20px; font-weight: 700; color: #1f2937;" id="currentMonth">February 2026</div>
                    <div style="font-size: 12px; color: #6b7280;" id="recordCount">Loading...</div>
                </div>
                <button class="month-btn" id="btn-next-month">
                    <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Monthly Summary -->
        <div class="card" id="summaryCard" style="display: none;">
            <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1f2937;">Monthly Summary</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" style="color: #1B5E3B;" id="totalDays">0</div>
                    <div class="stat-label">Total Days</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #10b981;" id="presentDays">0</div>
                    <div class="stat-label">Present</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #f59e0b;" id="lateDays">0</div>
                    <div class="stat-label">Late Arrivals</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #1B5E3B;" id="totalHours">0h</div>
                    <div class="stat-label">Total Hours</div>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div class="card" id="loadingState">
            <div class="loader"></div>
            <p style="text-align: center; color: #6b7280; margin-top: 16px;">Loading attendance records...</p>
        </div>

        <!-- Empty State -->
        <div class="card" id="emptyState" style="display: none;">
            <div class="empty-state">
                <div style="font-size: 64px; margin-bottom: 16px;">📅</div>
                <h3 style="font-size: 18px; font-weight: 600; color: #1f2937; margin-bottom: 8px;">No Records Found</h3>
                <p style="color: #6b7280;">No attendance records for this month</p>
            </div>
        </div>

        <!-- Attendance List -->
        <div id="attendanceList"></div>
    </div>


    <script src="/js/pages/history.js"></script>
</body>
</html>
