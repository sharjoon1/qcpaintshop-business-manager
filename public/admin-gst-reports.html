<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Reports — QC Business Manager</title>
<script src="/js/qc-escape.js?v=32133ff2"></script>
<script src="/universal-nav-loader.js?v=fb16cb40"></script>
<style>
:root { --primary:#667eea; --primary2:#764ba2; }
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI',system-ui,sans-serif; }
body { background:#f3f4f6; color:#111827; }
.header { background:linear-gradient(135deg,var(--primary),var(--primary2)); color:#fff; padding:16px 20px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
.header h1 { font-size:19px; }
.header a { color:#e0e7ff; text-decoration:none; font-size:13px; }
.controls { display:flex; gap:10px; align-items:center; margin-left:auto; flex-wrap:wrap; }
.controls input[type=month] { padding:7px 10px; border:none; border-radius:8px; font-size:14px; }
.tabs { display:flex; gap:8px; background:#fff; padding:10px 16px; border-bottom:1px solid #e5e7eb; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { padding:9px 16px; border:1px solid #e5e7eb; background:#f9fafb; cursor:pointer; font-size:13px; color:#374151; border-radius:99px; white-space:nowrap; flex:0 0 auto; }
.tab.active { color:#fff; background:linear-gradient(135deg,var(--primary),var(--primary2)); border-color:transparent; font-weight:600; }
.wrap { padding:16px; max-width:1200px; margin:0 auto; }
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; margin-bottom:14px; }
.card { background:#fff; border-radius:10px; padding:12px 14px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
.card .lbl { font-size:12px; color:#6b7280; }
.card .val { font-size:20px; font-weight:700; margin-top:2px; }
.banner-warn { background:#fef2f2; border:2px solid #dc2626; color:#991b1b; border-radius:10px; padding:12px 14px; font-weight:700; margin-bottom:14px; font-size:14px; }
.banner-info { background:#eff6ff; border:1px solid #3b82f6; color:#1e40af; border-radius:10px; padding:10px 14px; margin-bottom:14px; font-size:13px; }
.section-title { font-size:15px; font-weight:700; margin:18px 0 8px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.btn { padding:8px 14px; border:none; border-radius:8px; cursor:pointer; font-size:13px; background:var(--primary); color:#fff; white-space:nowrap; flex:0 0 auto; }
.btn.gray { background:#6b7280; }
table { width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.08); font-size:13px; }
th { background:#f9fafb; text-align:left; padding:9px 10px; color:#374151; border-bottom:1px solid #e5e7eb; white-space:nowrap; }
td { padding:8px 10px; border-bottom:1px solid #f3f4f6; }
td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
.muted { color:#9ca3af; font-size:12px; }
.pill { display:inline-block; padding:2px 8px; border-radius:99px; font-size:11px; font-weight:600; }
.pill.red { background:#fee2e2; color:#991b1b; } .pill.green { background:#dcfce7; color:#166534; }
.searchbox { padding:8px 12px; border:1px solid #d1d5db; border-radius:8px; width:100%; max-width:380px; font-size:14px; margin-bottom:10px; }
.tbl-scroll { overflow-x:auto; }
#loading { text-align:center; padding:30px; color:#6b7280; display:none; }
@media (max-width:640px){
    .header h1{font-size:16px}
    .wrap{padding:10px}
    .cards{grid-template-columns:repeat(2,1fr)}
    .card .val{font-size:16px}
    /* Tables with .m-cards become stacked cards on mobile */
    table.m-cards, table.m-cards tbody, table.m-cards tr, table.m-cards td { display:block; width:100%; }
    table.m-cards thead { display:none; }
    table.m-cards tr { background:#fff; border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.08); margin-bottom:10px; padding:10px 12px; }
    table.m-cards td { border:none; padding:3px 0; display:flex; justify-content:space-between; gap:10px; font-size:13px; text-align:right; }
    table.m-cards td::before { content:attr(data-l); color:#6b7280; font-weight:500; text-align:left; flex:0 0 auto; }
    table.m-cards td:not([data-l]) { justify-content:flex-end; }
    table.m-cards td.num { text-align:right; }
}
</style>
</head>
<body data-page="gst-reports">
<div class="header">
    <a href="/dashboard.html">←</a>
    <h1>📊 GST Reports</h1>
    <div class="controls">
        <input type="month" id="month">
        <button class="btn" onclick="loadActive()">Load</button>
    </div>
</div>
<div class="tabs">
    <button class="tab active" data-tab="filing" onclick="switchTab('filing')">GST Filing</button>
    <button class="tab" data-tab="cost" onclick="switchTab('cost')">Cost Analysis (Internal)</button>
    <button class="tab" data-tab="commission" onclick="switchTab('commission')">Painter Commission</button>
    <button class="tab" data-tab="profit" onclick="switchTab('profit')">Profitability</button>
    <button class="tab" data-tab="flags" onclick="switchTab('flags')">Non-GST Items</button>
</div>
<div class="wrap">
    <div id="loading">Loading…</div>
    <div id="tab-filing"></div>
    <div id="tab-cost" style="display:none"></div>
    <div id="tab-commission" style="display:none"></div>
    <div id="tab-profit" style="display:none"></div>
    <div id="tab-flags" style="display:none"></div>
</div>
<script>
const token = localStorage.getItem('auth_token');
if (!token) location.href = '/login.html';
const fmtINR = n => '₹' + Number(n || 0).toLocaleString('en-IN', { maximumFractionDigits: 2 });
let activeTab = 'filing';

document.getElementById('month').value = new Date(Date.now() - 86400000 * 28).toISOString().slice(0, 7);

async function api(path) {
    const res = await fetch(path, { headers: { Authorization: 'Bearer ' + token } });
    const data = await res.json();
    if (!data.success) throw new Error(data.message || 'Request failed');
    return data;
}

function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    ['filing', 'cost', 'commission', 'profit', 'flags'].forEach(t =>
        document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none');
    loadActive();
}

function csvDownload(filename, header, rows) {
    const escCsv = v => { const s = String(v == null ? '' : v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
    const csv = [header, ...rows].map(r => r.map(escCsv).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['﻿' + csv], { type: 'text/csv' }));
    a.download = filename;
    a.click();
}

let cache = {};
async function loadActive() {
    const month = document.getElementById('month').value;
    if (!month) return;
    document.getElementById('loading').style.display = 'block';
    try {
        if (activeTab === 'filing') await loadFiling(month);
        else if (activeTab === 'cost') await loadCost(month);
        else if (activeTab === 'commission') await loadCommission(month);
        else if (activeTab === 'profit') await loadProfit(month);
        else if (activeTab === 'flags') await loadFlags();
    } catch (e) {
        document.getElementById('tab-' + activeTab).innerHTML = '<div class="banner-warn">' + escHtml(e.message) + '</div>';
    }
    document.getElementById('loading').style.display = 'none';
}

let b2bCustomerFilter = '';
function filteredB2B() {
    const d = cache.filing;
    return b2bCustomerFilter ? d.b2b.filter(i => i.customer_name === b2bCustomerFilter) : d.b2b;
}

async function loadFiling(month) {
    const d = await api('/api/gst-reports/filing?month=' + month);
    cache.filing = d;
    b2bCustomerFilter = '';
    renderFiling();
}

function renderFiling() {
    const d = cache.filing;
    const month = d.month;
    const b2bRows = filteredB2B();
    const customers = [...new Set(d.b2b.map(i => i.customer_name))].sort();
    const el = document.getElementById('tab-filing');
    el.innerHTML = `
        <div class="banner-info">Actual sale values for <b>${escHtml(month)}</b> — this is the report for your auditor / GSTR-1. Every non-void invoice is included at its real value.</div>
        ${d.tax_note ? `<div class="banner-info" style="background:#fffbeb;border-color:#f59e0b;color:#92400e">ⓘ ${escHtml(d.tax_note)}</div>` : ''}
        <div class="cards">
            <div class="card"><div class="lbl">Invoices</div><div class="val">${d.totals.invoice_count}</div></div>
            <div class="card"><div class="lbl">Invoice number range (series-wise)</div>
                ${d.invoice_range && d.invoice_range.ranges.length
                    ? d.invoice_range.ranges.map(r => `<div class="val" style="font-size:14px;margin-top:3px">${escHtml(r.first)} → ${escHtml(r.last)} <span class="muted">(${r.count})</span></div>`).join('')
                    : '<div class="val">—</div>'}
                <div class="muted" style="margin-top:4px">Backdated invoices-ஆல் அடுத்தடுத்த மாத ranges overlap ஆகலாம் — Zoho numbering follow ஆகுது</div></div>
            <div class="card"><div class="lbl">Taxable (sub total)</div><div class="val">${fmtINR(d.totals.sub_total)}</div></div>
            <div class="card"><div class="lbl">GST (tax total)</div><div class="val">${fmtINR(d.totals.tax_total)}</div></div>
            <div class="card"><div class="lbl">Grand total</div><div class="val">${fmtINR(d.totals.total)}</div></div>
        </div>
        <div class="section-title">B2B — GST invoices (${b2bRows.length}${b2bCustomerFilter ? ' of ' + d.b2b.length : ''})
            <select id="b2bCustomer" onchange="b2bCustomerFilter=this.value; renderFiling()" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;max-width:240px">
                <option value="">All customers</option>
                ${customers.map(c => `<option value="${escAttr(c)}" ${c === b2bCustomerFilter ? 'selected' : ''}>${escHtml(c)}</option>`).join('')}
            </select>
            <button class="btn" onclick="exportB2B()">⬇ Invoices CSV</button>
            <button class="btn" onclick="loadB2BItems('filing')">📦 Item-wise (HSN)</button>
            <button class="btn gray" onclick="toggleMissedPanel()">➕ Missed invoice</button></div>
        ${b2bCustomerFilter ? (() => { const t = b2bRows.reduce((a, i) => ({ s: a.s + (+i.sub_total || 0), g: a.g + (+i.tax_total || 0), t: a.t + (+i.total || 0) }), { s: 0, g: 0, t: 0 }); return `
        <div class="cards">
            <div class="card" style="border-left:4px solid var(--primary)"><div class="lbl">${escHtml(b2bCustomerFilter)} — invoices</div><div class="val">${b2bRows.length}</div></div>
            <div class="card" style="border-left:4px solid var(--primary)"><div class="lbl">Taxable</div><div class="val">${fmtINR(t.s)}</div></div>
            <div class="card" style="border-left:4px solid var(--primary)"><div class="lbl">GST</div><div class="val">${fmtINR(t.g)}</div></div>
            <div class="card" style="border-left:4px solid var(--primary)"><div class="lbl">Total value</div><div class="val">${fmtINR(t.t)}</div></div>
        </div>`; })() : ''}
        <div id="missedPanel" style="display:none"></div>
        <div class="tbl-scroll"><table class="m-cards"><thead><tr><th>Date</th><th>Invoice #</th><th>Customer</th><th>GSTIN</th><th class="num">Taxable</th><th class="num">GST</th><th class="num">Total</th></tr></thead><tbody>
        ${b2bRows.map(i => `<tr><td data-l="Date">${escHtml(String(i.invoice_date).slice(0, 10))}</td><td data-l="Invoice #"><b>${escHtml(i.invoice_number)}</b></td><td data-l="Customer">${escHtml(i.customer_name)}</td><td data-l="GSTIN">${escHtml(i.gstin)}</td><td class="num" data-l="Taxable">${fmtINR(i.sub_total)}</td><td class="num" data-l="GST">${fmtINR(i.tax_total)}</td><td class="num" data-l="Total"><b>${fmtINR(i.total)}</b></td></tr>`).join('') || '<tr><td colspan="7" class="muted">No B2B invoices this month</td></tr>'}
        </tbody></table></div>
        ${d.carried && d.carried.length ? `
        <div class="section-title" style="color:#92400e">⤵ Carried forward into ${escHtml(month)} (missed in earlier months) — ${d.carried.length}</div>
        <div class="tbl-scroll"><table class="m-cards"><thead><tr><th>Original month</th><th>Date</th><th>Invoice #</th><th>Customer</th><th>GSTIN</th><th class="num">Taxable</th><th class="num">GST</th><th class="num">Total</th><th></th></tr></thead><tbody>
        ${d.carried.map(i => `<tr style="background:#fffbeb"><td data-l="Original month">${escHtml(i.original_month)}</td><td data-l="Date">${escHtml(String(i.invoice_date).slice(0, 10))}</td><td data-l="Invoice #"><b>${escHtml(i.invoice_number)}</b></td><td data-l="Customer">${escHtml(i.customer_name)}</td><td data-l="GSTIN">${escHtml(i.gstin)}</td><td class="num" data-l="Taxable">${fmtINR(i.sub_total)}</td><td class="num" data-l="GST">${fmtINR(i.tax_total)}</td><td class="num" data-l="Total"><b>${fmtINR(i.total)}</b></td><td><button class="btn gray" onclick="removeCarry('${escJS(i.zoho_invoice_id)}')">✖ Remove</button></td></tr>`).join('')}
        <tr style="font-weight:700"><td colspan="5" data-l="">Carried subtotal</td><td class="num" data-l="Taxable">${fmtINR(d.carried_totals.sub_total)}</td><td class="num" data-l="GST">${fmtINR(d.carried_totals.tax_total)}</td><td class="num" data-l="Total">${fmtINR(d.carried_totals.total)}</td><td></td></tr>
        </tbody></table></div>
        <div class="cards">
            <div class="card" style="border:2px solid #f59e0b"><div class="lbl">Combined filing total (month + carried)</div><div class="val">${fmtINR(d.combined_totals.total)}</div><div class="muted">taxable ${fmtINR(d.combined_totals.sub_total)} + GST ${fmtINR(d.combined_totals.tax_total)} · ${d.combined_totals.invoice_count} invoices</div></div>
        </div>` : ''}
        <div id="b2bItems"></div>
        <div class="section-title">B2C — consolidated</div>
        <div class="cards">
            <div class="card"><div class="lbl">B2C invoices</div><div class="val">${d.b2c.invoice_count}</div></div>
            <div class="card"><div class="lbl">Taxable</div><div class="val">${fmtINR(d.b2c.sub_total)}</div></div>
            <div class="card"><div class="lbl">GST</div><div class="val">${fmtINR(d.b2c.tax_total)}</div></div>
            <div class="card"><div class="lbl">Total</div><div class="val">${fmtINR(d.b2c.total)}</div></div>
        </div>
        <div class="section-title">HSN summary <button class="btn" onclick="exportHSN()">⬇ CSV</button></div>
        <div class="tbl-scroll"><table><thead><tr><th>HSN</th><th class="num">Tax %</th><th class="num">Qty</th><th class="num">Taxable value</th></tr></thead><tbody>
        ${d.hsn.map(h => `<tr><td>${escHtml(h.hsn)}</td><td class="num">${h.tax_pct != null ? escHtml(h.tax_pct) : '—'}</td><td class="num">${Number(h.qty).toLocaleString('en-IN')}</td><td class="num">${fmtINR(h.taxable_value)}</td></tr>`).join('')}
        </tbody></table></div>`;
}

function exportB2B() {
    const d = cache.filing;
    const suffix = b2bCustomerFilter ? '-' + b2bCustomerFilter.replace(/[^\w]+/g, '_').slice(0, 30) : '';
    csvDownload(`gst-filing-b2b-${d.month}${suffix}.csv`,
        ['Invoice Date', 'Invoice Number', 'Customer', 'GSTIN', 'Taxable Value', 'GST', 'Total'],
        filteredB2B().map(i => [String(i.invoice_date).slice(0, 10), i.invoice_number, i.customer_name, i.gstin, i.sub_total, i.tax_total, i.total]));
}

// mode: 'filing' (actual rates) | 'cost' (purchase-cost view, internal)
async function loadB2BItems(mode) {
    const month = document.getElementById('month').value;
    const box = document.getElementById(mode === 'cost' ? 'b2bItemsCost' : 'b2bItems');
    const filter = mode === 'cost' ? costCustomerFilter : b2bCustomerFilter;
    box.innerHTML = '<div class="muted" style="padding:14px">Loading item-wise detail… (first load fetches lines from Zoho — may take a minute)</div>';
    try {
        const q = '/api/gst-reports/b2b-items?month=' + month + (filter ? '&customer=' + encodeURIComponent(filter) : '');
        const d = await api(q);
        cache.b2bItems = d;
        const isCost = mode === 'cost';
        const head = isCost
            ? '<th>Item</th><th>HSN</th><th class="num">Qty</th><th class="num">Cost rate</th><th class="num">Value @ cost</th><th class="num">Actual amount</th>'
            : '<th>Item</th><th>HSN</th><th class="num">Qty</th><th class="num">Rate</th><th class="num">Amount</th>';
        const rowOf = it => isCost
            ? `<tr><td>${escHtml(it.name)}</td><td>${escHtml(it.hsn || '—')}</td><td class="num">${it.quantity}</td><td class="num">${it.cost_rate != null ? fmtINR(it.cost_rate) : '—'}<div class="muted">${escHtml(it.cost_source || '')}</div></td><td class="num">${it.cost_value != null ? fmtINR(it.cost_value) : '—'}</td><td class="num">${fmtINR(it.item_total)}</td></tr>`
            : `<tr><td>${escHtml(it.name)}</td><td>${escHtml(it.hsn || '—')}</td><td class="num">${it.quantity}</td><td class="num">${fmtINR(it.rate)}</td><td class="num">${fmtINR(it.item_total)}</td></tr>`;
        box.innerHTML = `
            <div class="section-title">${isCost ? 'B2B invoice-wise at PURCHASE COST (internal)' : 'Item-wise detail with HSN'} (${d.invoices.length} invoices)
                <button class="btn" onclick="exportB2BItems('${isCost ? 'cost' : 'filing'}')">⬇ Item-wise CSV</button>
                ${d.fetched_from_zoho ? `<span class="muted">${d.fetched_from_zoho} fetched from Zoho & cached</span>` : ''}</div>
            ${d.invoices.map(inv => `
                <div style="margin-bottom:12px">
                    <div style="font-weight:600;font-size:13px;padding:6px 2px">${inv.carried_from ? `<span class="pill" style="background:#fef3c7;color:#92400e">carried from ${escHtml(inv.carried_from)}</span> ` : ''}${escHtml(inv.invoice_number)} · ${escHtml(String(inv.invoice_date).slice(0, 10))} · ${escHtml(inv.customer_name)} <span class="muted">${escHtml(inv.gstin)}</span> · ${fmtINR(inv.total)}</div>
                    ${inv.fetch_error ? `<div class="banner-warn">${escHtml(inv.fetch_error)}</div>` : `
                    <div class="tbl-scroll"><table><thead><tr>${head}</tr></thead><tbody>
                    ${inv.items.map(rowOf).join('')}
                    </tbody></table></div>`}
                </div>`).join('')}`;
    } catch (e) {
        box.innerHTML = '<div class="banner-warn">' + escHtml(e.message) + '</div>';
    }
}

async function toggleMissedPanel() {
    const p = document.getElementById('missedPanel');
    if (p.style.display !== 'none') { p.style.display = 'none'; return; }
    p.style.display = '';
    p.innerHTML = `
        <div style="background:#fffbeb;border:1px solid #f59e0b;border-radius:10px;padding:12px;margin-bottom:12px">
            <div style="font-weight:700;margin-bottom:8px">முந்தைய மாதங்களில் filing-ல் விடுபட்ட B2B invoice-ஐ இந்த மாதக் கணக்கில் சேர்க்க</div>
            <input class="searchbox" id="missedSearch" placeholder="Invoice # / customer search…" oninput="debounceMissed()">
            <div id="missedList" class="muted">கடந்த 6 மாத B2B invoices (carry ஆகாதவை) தேடுங்க…</div>
        </div>`;
    renderMissed('');
}

let missedTimer;
function debounceMissed() { clearTimeout(missedTimer); missedTimer = setTimeout(() => renderMissed(document.getElementById('missedSearch').value), 350); }

async function renderMissed(search) {
    const month = document.getElementById('month').value;
    const d = await api('/api/gst-reports/missed-b2b?month=' + month + '&search=' + encodeURIComponent(search));
    document.getElementById('missedList').innerHTML = d.candidates.length ? `
        <div class="tbl-scroll"><table class="m-cards"><thead><tr><th>Date</th><th>Invoice #</th><th>Customer</th><th>GSTIN</th><th class="num">Total</th><th></th></tr></thead><tbody>
        ${d.candidates.map(c => `<tr><td data-l="Date">${escHtml(String(c.invoice_date).slice(0, 10))}</td><td data-l="Invoice #"><b>${escHtml(c.invoice_number)}</b></td><td data-l="Customer">${escHtml(c.customer_name)}</td><td data-l="GSTIN">${escHtml(c.gstin)}</td><td class="num" data-l="Total">${fmtINR(c.total)}</td>
            <td><button class="btn" onclick="addCarry('${escJS(c.zoho_invoice_id)}')">Include in ${escHtml(month)}</button></td></tr>`).join('')}
        </tbody></table></div>` : '<div class="muted">Match இல்லை (carry ஆனவை இங்கு வராது)</div>';
}

async function addCarry(zohoInvoiceId) {
    const month = document.getElementById('month').value;
    const res = await fetch('/api/gst-reports/carry-forward', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ zoho_invoice_id: zohoInvoiceId, filed_in_month: month }),
    });
    const d = await res.json();
    if (!d.success) { alert(d.message || 'Failed'); return; }
    loadActive();
}

async function removeCarry(zohoInvoiceId) {
    await fetch('/api/gst-reports/carry-forward/' + encodeURIComponent(zohoInvoiceId), {
        method: 'DELETE', headers: { Authorization: 'Bearer ' + token },
    });
    loadActive();
}

function exportB2BItems(mode) {
    const d = cache.b2bItems;
    const filter = mode === 'cost' ? costCustomerFilter : b2bCustomerFilter;
    const suffix = filter ? '-' + filter.replace(/[^\w]+/g, '_').slice(0, 30) : '';
    const rows = [];
    for (const inv of d.invoices) for (const it of inv.items) {
        rows.push(mode === 'cost'
            ? [String(inv.invoice_date).slice(0, 10), inv.invoice_number, inv.customer_name, it.name, it.hsn, it.quantity, it.cost_rate, it.cost_value, it.item_total]
            : [String(inv.invoice_date).slice(0, 10), inv.invoice_number, inv.customer_name, inv.gstin, it.name, it.hsn, it.quantity, it.rate, it.item_total]);
    }
    if (mode === 'cost') {
        csvDownload(`INTERNAL-b2b-at-cost-${d.month}${suffix}-NOT-FOR-FILING.csv`,
            ['INTERNAL — NOT FOR GST FILING', '', '', '', '', '', '', '', ''],
            [['Invoice Date', 'Invoice Number', 'Customer', 'Item', 'HSN', 'Qty', 'Cost Rate', 'Value At Cost', 'Actual Amount'], ...rows]);
    } else {
        csvDownload(`gst-filing-b2b-items-${d.month}${suffix}.csv`,
            ['Invoice Date', 'Invoice Number', 'Customer', 'GSTIN', 'Item', 'HSN', 'Qty', 'Rate', 'Amount'], rows);
    }
}
function exportHSN() {
    const d = cache.filing;
    csvDownload(`gst-filing-hsn-${d.month}.csv`, ['HSN', 'Tax %', 'Qty', 'Taxable Value'],
        d.hsn.map(h => [h.hsn, h.tax_pct, h.qty, h.taxable_value]));
}

let costCustomerFilter = '';
async function loadCost(month) {
    const d = await api('/api/gst-reports/cost-analysis?month=' + month);
    cache.cost = d;
    if (!cache.filing || cache.filing.month !== month) {
        try { cache.filing = await api('/api/gst-reports/filing?month=' + month); } catch (e) { /* dropdown just stays empty */ }
    }
    const costCustomers = cache.filing ? [...new Set(cache.filing.b2b.map(i => i.customer_name))].sort() : [];
    const row = it => `<tr><td>${escHtml(it.item_name)}</td><td>${escHtml(it.sku || '')}</td><td class="num">${Number(it.qty).toLocaleString('en-IN')}</td><td class="num">${it.cost_rate != null ? fmtINR(it.cost_rate) : '—'}<div class="muted">${escHtml(it.cost_source)}</div></td><td class="num">${it.cost_value != null ? fmtINR(it.cost_value) : '—'}</td><td class="num">${fmtINR(it.actual_revenue)}</td></tr>`;
    document.getElementById('tab-cost').innerHTML = `
        <div class="banner-warn">⚠ ${escHtml(d.disclaimer)}</div>
        <div class="cards">
            <div class="card"><div class="lbl">Actual revenue (incl. items)</div><div class="val">${fmtINR(d.summary.actual_revenue)}</div></div>
            <div class="card"><div class="lbl">Value at purchase cost</div><div class="val">${fmtINR(d.summary.cost_value)}</div></div>
            <div class="card"><div class="lbl">Gross margin</div><div class="val">${fmtINR(d.summary.gross_margin)}</div></div>
        </div>
        <div class="section-title">B2B invoice-wise at cost
            <select onchange="costCustomerFilter=this.value" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;max-width:240px">
                <option value="">All customers</option>
                ${costCustomers.map(c => `<option value="${escAttr(c)}" ${c === costCustomerFilter ? 'selected' : ''}>${escHtml(c)}</option>`).join('')}
            </select>
            <button class="btn" onclick="loadB2BItems('cost')">📦 Load invoice-wise (HSN + cost)</button></div>
        <div id="b2bItemsCost"></div>
        <div class="section-title">Items (GST-purchased) — ${d.included.length}
            <button class="btn" onclick="exportCost()">⬇ CSV</button></div>
        <div class="tbl-scroll"><table><thead><tr><th>Item</th><th>SKU</th><th class="num">Qty</th><th class="num">Cost rate</th><th class="num">Value @ cost</th><th class="num">Actual revenue</th></tr></thead><tbody>
        ${d.included.map(row).join('')}
        </tbody></table></div>
        ${d.excluded_non_gst.length ? `<div class="section-title">Excluded — flagged "purchased without GST" (${d.excluded_non_gst.length})</div>
        <div class="tbl-scroll"><table><thead><tr><th>Item</th><th>SKU</th><th class="num">Qty</th><th class="num">Cost rate</th><th class="num">Value @ cost</th><th class="num">Actual revenue</th></tr></thead><tbody>${d.excluded_non_gst.map(row).join('')}</tbody></table></div>` : ''}
        ${d.no_cost_data.length ? `<div class="section-title">No cost data (${d.no_cost_data.length}) <span class="muted">set DPL / purchase rate in Zoho items</span></div>
        <div class="tbl-scroll"><table><thead><tr><th>Item</th><th>SKU</th><th class="num">Qty</th><th class="num">Cost rate</th><th class="num">Value @ cost</th><th class="num">Actual revenue</th></tr></thead><tbody>${d.no_cost_data.map(row).join('')}</tbody></table></div>` : ''}`;
}

function exportCost() {
    const d = cache.cost;
    csvDownload(`INTERNAL-cost-analysis-${d.month}-NOT-FOR-FILING.csv`,
        ['INTERNAL COST ANALYSIS — NOT FOR GST FILING', '', '', '', '', ''],
        [['Item', 'SKU', 'Qty', 'Cost Rate', 'Value At Cost', 'Actual Revenue'],
         ...d.included.map(i => [i.item_name, i.sku, i.qty, i.cost_rate, i.cost_value, i.actual_revenue])]);
}

async function loadCommission(month) {
    const d = await api('/api/gst-reports/commission-expense?month=' + month);
    cache.commission = d;
    document.getElementById('tab-commission').innerHTML = `
        <div class="banner-info">${escHtml(d.note)} Give this to your auditor — it is a deductible business expense.</div>
        <div class="cards"><div class="card"><div class="lbl">Total commission paid (${escHtml(month)})</div><div class="val">${fmtINR(d.total)}</div></div>
        <div class="card"><div class="lbl">Payouts</div><div class="val">${d.withdrawals.length}</div></div></div>
        <div class="section-title">Payouts <button class="btn" onclick="exportCommission()">⬇ CSV</button></div>
        <div class="tbl-scroll"><table class="m-cards"><thead><tr><th>Date</th><th>Painter</th><th>Phone</th><th>Pool</th><th class="num">Amount</th><th>Status</th><th>Payment ref</th></tr></thead><tbody>
        ${d.withdrawals.map(w => `<tr><td data-l="Date">${escHtml(String(w.processed_at).slice(0, 10))}</td><td data-l="Painter"><b>${escHtml(w.full_name)}</b></td><td data-l="Phone">${escHtml(w.phone)}</td><td data-l="Pool">${escHtml(w.point_pool)}</td><td class="num" data-l="Amount"><b>${fmtINR(w.amount)}</b></td><td data-l="Status">${escHtml(w.status)}</td><td data-l="Payment ref">${escHtml(w.payment_reference || '')}</td></tr>`).join('') || '<tr><td colspan="7" class="muted">No payouts this month</td></tr>'}
        </tbody></table></div>`;
}

function exportCommission() {
    const d = cache.commission;
    csvDownload(`painter-commission-expense-${d.month}.csv`,
        ['Date', 'Painter', 'Phone', 'Pool', 'Amount', 'Status', 'Payment Reference'],
        d.withdrawals.map(w => [String(w.processed_at).slice(0, 10), w.full_name, w.phone, w.point_pool, w.amount, w.status, w.payment_reference]));
}

async function loadProfit(month) {
    const d = await api('/api/gst-reports/profitability?month=' + month);
    document.getElementById('tab-profit').innerHTML = `
        <div class="banner-info">${escHtml(d.note)}</div>
        <div class="cards">
            <div class="card"><div class="lbl">Sales (taxable)</div><div class="val">${fmtINR(d.sales.taxable)}</div></div>
            <div class="card"><div class="lbl">GST collected</div><div class="val">${fmtINR(d.sales.gst)}</div></div>
            <div class="card"><div class="lbl">COGS (at cost)</div><div class="val">${fmtINR(d.cogs)}</div></div>
            <div class="card"><div class="lbl">Gross margin</div><div class="val">${fmtINR(d.gross_margin)}</div></div>
            <div class="card"><div class="lbl">Painter commission</div><div class="val">− ${fmtINR(d.painter_commission)}</div></div>
            <div class="card"><div class="lbl">Staff salary</div><div class="val">− ${fmtINR(d.staff_salary)}</div></div>
            <div class="card" style="border:2px solid var(--primary)"><div class="lbl">Indicative net (before rent etc.)</div><div class="val">${fmtINR(d.indicative_net)}</div></div>
        </div>
        ${d.uncosted_items ? `<div class="muted">${d.uncosted_items} item(s) had no cost data and are excluded from COGS.</div>` : ''}`;
}

async function loadFlags() {
    const el = document.getElementById('tab-flags');
    el.innerHTML = `
        <div class="banner-info">"Purchased <b>without</b> GST bill" என்று flag செய்யும் items, Cost Analysis (Internal) tab-ல் தனியா பிரிக்கப்படும். GST Filing report-ஐ இது எந்த விதத்திலும் மாற்றாது.</div>
        <input class="searchbox" id="flagSearch" placeholder="Search item / SKU…" oninput="debounceFlags()">
        <div id="flagList"></div>`;
    await renderFlags('');
}

let flagTimer;
function debounceFlags() { clearTimeout(flagTimer); flagTimer = setTimeout(() => renderFlags(document.getElementById('flagSearch').value), 350); }

async function renderFlags(search) {
    const d = await api('/api/gst-reports/item-flags?search=' + encodeURIComponent(search));
    document.getElementById('flagList').innerHTML = `
        <div class="tbl-scroll"><table><thead><tr><th>Item</th><th>SKU</th><th>Brand</th><th>Purchase</th><th></th></tr></thead><tbody>
        ${d.items.map(i => `<tr><td>${escHtml(i.zoho_item_name)}</td><td>${escHtml(i.zoho_sku || '')}</td><td>${escHtml(i.zoho_brand || '')}</td>
            <td>${i.gst_purchase ? '<span class="pill green">GST bill</span>' : '<span class="pill red">No GST bill</span>'}</td>
            <td><button class="btn gray" onclick="toggleFlag('${escJS(i.zoho_item_id)}', ${i.gst_purchase ? 0 : 1})">${i.gst_purchase ? 'Mark: no GST bill' : 'Mark: GST bill'}</button></td></tr>`).join('')}
        </tbody></table></div>`;
}

async function toggleFlag(itemId, flag) {
    await fetch('/api/gst-reports/item-flags/' + encodeURIComponent(itemId), {
        method: 'PUT',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ gst_purchase: flag }),
    });
    renderFlags(document.getElementById('flagSearch').value);
}

loadActive();
</script>
