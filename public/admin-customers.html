<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Admin Dashboard - Quality Colours Manager</title>
    <script src="/js/auth-helper.js?v=7101c516"></script>
    <script src="/js/pages/admin-customers-authguard.js?v=b3c7e9a2"></script>
    <link rel="stylesheet" href="/css/tailwind.css?v=849f1b5c">
    <link rel="stylesheet" href="/css/design-system.css?v=876c7d73">
    <script src="/universal-nav-loader.js?v=fb16cb40"></script>
    <style>
        @media (max-width: 768px) {
            .hide-mobile { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50" data-page="customers">
<!-- Main Content -->
    <div class="container mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Customer Management</h2>
                <p class="text-gray-600 mt-1">Manage your customers across all branches</p>
            </div>
            <button id="addCustomerBtn" class="btn btn-primary">
                + Add Customer
            </button>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="card stat-card">
                <div class="text-gray-500 text-sm font-semibold">Total Customers</div>
                <div class="text-2xl font-bold text-purple-600" id="totalCustomers">0</div>
            </div>
            <div class="card stat-card">
                <div class="text-gray-500 text-sm font-semibold">Approved</div>
                <div class="text-2xl font-bold text-green-600" id="approvedCustomers">0</div>
            </div>
            <div class="card stat-card">
                <div class="text-gray-500 text-sm font-semibold">Pending</div>
                <div class="text-2xl font-bold text-orange-600" id="pendingCustomers">0</div>
            </div>
            <div class="card stat-card">
                <div class="text-gray-500 text-sm font-semibold">Current Branch</div>
                <div class="text-lg font-bold text-gray-800" id="currentBranch">All</div>
            </div>
        </div>

        <!-- Customers Table -->
        <div class="card">
            <div class="flex items-center justify-end mb-4">
                <label class="form-label mr-2 mb-0">Branch:</label>
                <select id="branchFilter" class="form-input" style="max-width:240px;">
                    <option value="">All Branches</option>
                </select>
            </div>
            <div class="overflow-x-auto">
                <table class="table min-w-0">
                    <thead>
                        <tr>
                            <th class="hide-mobile">ID</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th class="hide-mobile">Email</th>
                            <th class="hide-mobile">City</th>
                            <th>Branch</th>
                            <th class="hide-mobile">GST Number</th>
                            <th>Status</th>
                            <th class="text-center whitespace-nowrap">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customersTableBody">
                        <tr>
                            <td colspan="9" class="text-center py-8 text-gray-500">Loading customers...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="customerModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="card max-w-3xl w-full max-h-[90vh] overflow-y-auto my-8">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modalTitle" class="text-2xl font-bold text-gray-800">Add Customer</h3>
                <button id="modalCloseBtn" class="text-gray-500 hover:text-gray-700 text-2xl">×</button>
            </div>

            <form id="customerForm">
                <input type="hidden" id="customerId">

                <div class="mb-4">
                    <label class="form-label">Customer Name *</label>
                    <input type="text" id="customerName" required class="form-input" placeholder="e.g. John Doe">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="form-label">Phone *</label>
                        <input type="tel" id="customerPhone" required class="form-input" placeholder="9876543210">
                    </div>

                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" id="customerEmail" class="form-input" placeholder="john@example.com">
                    </div>

                    <div>
                        <label class="form-label">City</label>
                        <input type="text" id="customerCity" class="form-input" placeholder="Ramanathapuram">
                    </div>

                    <div>
                        <label class="form-label">Branch *</label>
                        <select id="customerBranch" required class="form-input">
                            <option value="">-- Select Branch --</option>
                        </select>
                    </div>

                    <div>
                        <label class="form-label">Customer Type</label>
                        <select id="customerType" class="form-input">
                            <option value="">-- Select Type --</option>
                        </select>
                    </div>

                    <div>
                        <label class="form-label">GST Number</label>
                        <input type="text" id="customerGst" class="form-input" placeholder="29ABCDE1234F1Z5">
                    </div>

                    <div>
                        <label class="form-label">Status</label>
                        <select id="customerStatus" class="form-input">
                            <option value="pending">Pending</option>
                            <option value="approved">Approved</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Address</label>
                    <textarea id="customerAddress" rows="3" class="form-input" placeholder="Full address..."></textarea>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" id="modalCancelBtn" class="flex-1 btn btn-secondary">
                        Cancel
                    </button>
                    <button type="submit" class="flex-1 btn btn-primary">
                        Save Customer
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/pages/admin-customers.js?v=a1f4d82e"></script>
</body>
</html>
