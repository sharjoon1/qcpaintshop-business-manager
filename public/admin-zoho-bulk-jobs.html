<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Bulk Jobs - Quality Colours Manager</title>
    <link rel="stylesheet" href="/css/tailwind.css?v=849f1b5c">
    <link rel="stylesheet" href="/css/design-system.css?v=876c7d73">
    <link rel="stylesheet" href="/css/zoho-common.css?v=b2e96640">
    <script src="/universal-nav-loader.js?v=6b4a6dbe"></script>
    <script src="/js/auth-helper.js?v=7101c516"></script>
    <script src="/js/pages/admin-zoho-bulk-jobs-authguard.js"></script>
    <style>
        /* Status badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.2rem 0.65rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .badge-pending { background: #f3f4f6; color: #374151; }
        .badge-processing { background: #dbeafe; color: #1e40af; }
        .badge-completed { background: #dcfce7; color: #166534; }
        .badge-failed { background: #fee2e2; color: #991b1b; }
        .badge-cancelled { background: #fef9c3; color: #854d0e; }

        /* Processing pulse animation */
        .badge-processing .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #1e40af;
            animation: pulse-dot 1.2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        /* Progress bar */
        .progress-bar-bg {
            background: #e5e7eb;
            border-radius: 9999px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 9999px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
        }
        .progress-bar-fill.completed { background: #10b981; }
        .progress-bar-fill.failed { background: #ef4444; }

        /* Job card */
        .job-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.2s;
            overflow: hidden;
        }
        .job-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .job-card-header {
            cursor: pointer;
            padding: 1.25rem;
        }
        .job-card-detail {
            border-top: 1px solid #f3f4f6;
            padding: 1rem 1.25rem;
            background: #fafbfc;
        }

        /* Detail table */
        .detail-table {
            width: 100%;
            font-size: 0.8rem;
        }
        .detail-table th {
            padding: 0.5rem 0.75rem;
            font-weight: 600;
            text-align: left;
            color: #6b7280;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.04em;
            background: #f3f4f6;
        }
        .detail-table td {
            padding: 0.5rem 0.75rem;
            color: #374151;
            border-bottom: 1px solid #f3f4f6;
        }
        .detail-table tr:last-child td { border-bottom: none; }

        /* Item status mini badge */
        .item-badge {
            display: inline-block;
            padding: 0.1rem 0.45rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .item-badge-pending { background: #f3f4f6; color: #6b7280; }
        .item-badge-processing { background: #dbeafe; color: #1e40af; }
        .item-badge-completed { background: #dcfce7; color: #166534; }
        .item-badge-failed { background: #fee2e2; color: #991b1b; }
        .item-badge-skipped { background: #fef9c3; color: #854d0e; }

        /* Chevron rotate on expand */
        .chevron-icon { transition: transform 0.2s; }
        .chevron-icon.rotated { transform: rotate(180deg); }

        /* Confirm dialog overlay */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .confirm-dialog {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
            padding: 1.5rem;
        }
    </style>
</head>
<body class="bg-gray-50" data-page="zoho-bulk-jobs">
<div class="container mx-auto p-4 md:p-6">

    <!-- Toast Notification -->
    <div id="toast" class="toast" role="alert"></div>

    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6">
        <div>
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800">Bulk Update Jobs</h1>
            <p class="text-gray-500 text-sm mt-1">Monitor and manage bulk item update operations</p>
        </div>
        <div class="mt-3 sm:mt-0 flex items-center gap-2">
            <span id="autoRefreshLabel" class="text-xs text-gray-400 hidden">
                <span class="inline-block w-2 h-2 bg-green-400 rounded-full mr-1 animate-pulse"></span>Auto-refreshing
            </span>
            <button id="refreshBtn" class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-sm font-semibold rounded-lg transition shadow-sm">
                <svg id="refreshIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                Refresh
            </button>
        </div>
    </div>

    <!-- Summary Stats -->
    <div id="statsRow" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
        <div class="bg-white rounded-lg shadow-sm p-4 border-l-4 border-gray-300">
            <div class="text-xs font-semibold text-gray-500 uppercase">Total Jobs</div>
            <div class="text-2xl font-bold text-gray-800 mt-1" id="statTotal">--</div>
        </div>
        <div class="bg-white rounded-lg shadow-sm p-4 border-l-4 border-blue-400">
            <div class="text-xs font-semibold text-gray-500 uppercase">Processing</div>
            <div class="text-2xl font-bold text-blue-600 mt-1" id="statProcessing">--</div>
        </div>
        <div class="bg-white rounded-lg shadow-sm p-4 border-l-4 border-green-400">
            <div class="text-xs font-semibold text-gray-500 uppercase">Completed</div>
            <div class="text-2xl font-bold text-green-600 mt-1" id="statCompleted">--</div>
        </div>
        <div class="bg-white rounded-lg shadow-sm p-4 border-l-4 border-red-400">
            <div class="text-xs font-semibold text-gray-500 uppercase">Failed</div>
            <div class="text-2xl font-bold text-red-600 mt-1" id="statFailed">--</div>
        </div>
        <div class="bg-white rounded-lg shadow-sm p-4 border-l-4 border-yellow-400">
            <div class="text-xs font-semibold text-gray-500 uppercase">Pending</div>
            <div class="text-2xl font-bold text-yellow-600 mt-1" id="statPending">--</div>
        </div>
    </div>

    <!-- Loading Skeleton -->
    <div id="loadingState" class="space-y-4">
        <div class="skeleton" style="width: 100%; height: 120px;"></div>
        <div class="skeleton" style="width: 100%; height: 120px;"></div>
        <div class="skeleton" style="width: 100%; height: 120px;"></div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-16 bg-white rounded-xl shadow-sm">
        <svg class="mx-auto w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
        </svg>
        <h3 class="text-lg font-semibold text-gray-700 mb-2">No bulk jobs found</h3>
        <p class="text-gray-500 text-sm">Bulk update jobs will appear here when you trigger them from the items page.</p>
    </div>

    <!-- Jobs List -->
    <div id="jobsList" class="hidden space-y-4"></div>

    <!-- Confirm Dialog (hidden by default) -->
    <div id="confirmOverlay" class="confirm-overlay hidden">
        <div id="confirmDialogContent" class="confirm-dialog">
            <h3 id="confirmTitle" class="text-lg font-bold text-gray-800 mb-2"></h3>
            <p id="confirmMessage" class="text-sm text-gray-600 mb-5"></p>
            <div class="flex gap-3 justify-end">
                <button id="confirmCancelBtn" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition">Cancel</button>
                <button id="confirmActionBtn" class="px-4 py-2 text-sm font-medium text-white rounded-lg transition"></button>
            </div>
        </div>
    </div>

</div>

<script src="/js/pages/admin-zoho-bulk-jobs.js"></script>
</body>
</html>
