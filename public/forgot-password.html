<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1B5E3B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Forgot Password - Quality Colours Manager</title>
    <link rel="stylesheet" href="/css/tailwind.css?v=f841e189">
    <style>
        body {
            background: linear-gradient(135deg, #1B5E3B 0%, #154D31 100%);
        }
        .otp-input {
            width: 44px;
            height: 52px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }
        .otp-input:focus {
            outline: none;
            border-color: #16a34a;
            box-shadow: 0 0 0 2px rgba(22,163,74,0.18);
        }
    </style>
    <script src="/universal-nav-loader.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div class="bg-white w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Reset Password</h1>
            <p class="text-green-200" id="stepCaption">Enter your registered mobile to receive an OTP</p>
        </div>

        <!-- Reset Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">

            <!-- Step 1: Mobile -->
            <div id="step1">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Mobile Number</label>
                <div class="flex items-stretch">
                    <span class="inline-flex items-center px-3 border border-r-0 border-gray-300 rounded-l-lg bg-gray-50 text-gray-600 text-sm">+91</span>
                    <input
                        type="tel"
                        id="mobile"
                        inputmode="numeric"
                        pattern="[0-9]*"
                        maxlength="10"
                        class="flex-1 w-full px-4 py-3 border border-gray-300 rounded-r-lg focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent transition"
                        placeholder="7418831122"
                        required
                    >
                </div>
                <button id="btnSendOtp" type="button"
                    class="mt-6 w-full bg-gradient-to-r from-green-600 to-teal-600 text-white py-3 rounded-lg font-semibold hover:from-green-700 hover:to-teal-700 transition shadow-lg">
                    Send OTP
                </button>
            </div>

            <!-- Step 2: OTP -->
            <div id="step2" class="hidden">
                <p class="text-sm text-gray-600 mb-3" id="otpSentMsg">Verification code sent via SMS</p>
                <div class="flex justify-between gap-2 mb-6">
                    <input class="otp-input" maxlength="1" inputmode="numeric" data-otp="1">
                    <input class="otp-input" maxlength="1" inputmode="numeric" data-otp="2">
                    <input class="otp-input" maxlength="1" inputmode="numeric" data-otp="3">
                    <input class="otp-input" maxlength="1" inputmode="numeric" data-otp="4">
                    <input class="otp-input" maxlength="1" inputmode="numeric" data-otp="5">
                    <input class="otp-input" maxlength="1" inputmode="numeric" data-otp="6">
                </div>
                <button id="btnVerifyOtp" type="button"
                    class="w-full bg-gradient-to-r from-green-600 to-teal-600 text-white py-3 rounded-lg font-semibold hover:from-green-700 hover:to-teal-700 transition shadow-lg">
                    Verify Code
                </button>
                <button id="btnBack1" type="button" class="mt-3 w-full text-sm text-gray-600 hover:text-gray-800">
                    ← Use a different mobile
                </button>
            </div>

            <!-- Step 3: New password -->
            <div id="step3" class="hidden">
                <label class="block text-gray-700 text-sm font-semibold mb-2">New Password</label>
                <input
                    type="password"
                    id="password"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent transition"
                    placeholder="At least 8 characters, 1 uppercase, 1 number"
                    required
                >
                <label class="block text-gray-700 text-sm font-semibold mb-2 mt-4">Confirm Password</label>
                <input
                    type="password"
                    id="passwordConfirm"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent transition"
                    placeholder="Re-enter the new password"
                    required
                >
                <button id="btnReset" type="button"
                    class="mt-6 w-full bg-gradient-to-r from-green-600 to-teal-600 text-white py-3 rounded-lg font-semibold hover:from-green-700 hover:to-teal-700 transition shadow-lg">
                    Reset Password
                </button>
            </div>

            <!-- Step 4: Done -->
            <div id="step4" class="hidden text-center">
                <div class="mx-auto w-16 h-16 rounded-full bg-green-50 flex items-center justify-center mb-3">
                    <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-gray-800">Password updated</h2>
                <p class="text-sm text-gray-600 mt-2 mb-6">You can sign in with your new password now.</p>
                <a href="/login.html" class="block w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition shadow-lg">
                    Go to Login
                </a>
            </div>

            <!-- Inline alerts -->
            <div id="errorMessage" class="hidden mt-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm" role="alert"></div>

            <!-- Back to Login (hidden on success) -->
            <div class="mt-6 text-center" id="footerLinks">
                <a href="/login.html" class="text-sm text-green-600 hover:text-green-800 font-medium">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        let otpId = null;

        const errEl = document.getElementById('errorMessage');
        function showError(msg) {
            errEl.textContent = msg;
            errEl.classList.remove('hidden');
        }
        function clearError() {
            errEl.classList.add('hidden');
            errEl.textContent = '';
        }

        function goToStep(n) {
            ['step1','step2','step3','step4'].forEach((id, idx) => {
                document.getElementById(id).classList.toggle('hidden', idx !== n - 1);
            });
            const captions = {
                1: 'Enter your registered mobile to receive an OTP',
                2: 'Enter the 6-digit code we sent via SMS',
                3: 'Choose a new password for your account',
                4: 'All done!',
            };
            document.getElementById('stepCaption').textContent = captions[n] || '';
            if (n === 4) document.getElementById('footerLinks').classList.add('hidden');
            clearError();
        }

        // OTP input auto-advance
        document.querySelectorAll('.otp-input').forEach((input, idx, arr) => {
            input.addEventListener('input', e => {
                const v = e.target.value.replace(/\D/g, '');
                e.target.value = v;
                if (v && idx < arr.length - 1) arr[idx + 1].focus();
            });
            input.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !e.target.value && idx > 0) arr[idx - 1].focus();
            });
        });
        function getOtp() {
            return Array.from(document.querySelectorAll('.otp-input')).map(i => i.value).join('');
        }

        async function sendOtp() {
            const mobile = document.getElementById('mobile').value.trim();
            if (!/^[6-9]\d{9}$/.test(mobile)) {
                return showError('Enter a valid 10-digit Indian mobile number.');
            }
            const btn = document.getElementById('btnSendOtp');
            btn.disabled = true; btn.textContent = 'Sending...';
            try {
                const res = await fetch('/api/otp/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, purpose: 'Password Reset' }),
                });
                const data = await res.json();
                if (data.success) {
                    if (data.data && data.data.otp_id) {
                        otpId = data.data.otp_id;
                        goToStep(2);
                    } else {
                        // Generic privacy response — no user with this mobile.
                        // Show the same step-2 framing so we don't leak whether
                        // the number is registered; verify will simply fail.
                        otpId = 0;
                        goToStep(2);
                    }
                    document.getElementById('otpSentMsg').innerHTML =
                        `If <strong>${mobile}</strong> is registered, an OTP was sent via SMS.`;
                } else {
                    showError(data.error || data.message || 'Could not send OTP. Try again.');
                }
            } catch (e) {
                showError('Network error. Please try again.');
            }
            btn.disabled = false; btn.textContent = 'Send OTP';
        }

        async function verifyOtp() {
            const otp = getOtp();
            if (otp.length !== 6) return showError('Enter the 6-digit code.');
            if (!otpId) return showError('No OTP request found for this number.');
            const mobile = document.getElementById('mobile').value.trim();
            const btn = document.getElementById('btnVerifyOtp');
            btn.disabled = true; btn.textContent = 'Verifying...';
            try {
                const res = await fetch('/api/otp/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, otp_code: otp, purpose: 'Password Reset' }),
                });
                const data = await res.json();
                if (data.success) {
                    otpId = data.data.id;
                    goToStep(3);
                } else {
                    showError(data.error || data.message || 'Invalid or expired code.');
                }
            } catch (e) {
                showError('Network error. Please try again.');
            }
            btn.disabled = false; btn.textContent = 'Verify Code';
        }

        async function resetPassword() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('passwordConfirm').value;
            if (password.length < 8 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
                return showError('Password must be at least 8 characters with one uppercase letter and one number.');
            }
            if (password !== confirm) return showError('Passwords do not match.');

            const mobile = document.getElementById('mobile').value.trim();
            const btn = document.getElementById('btnReset');
            btn.disabled = true; btn.textContent = 'Resetting...';
            try {
                const res = await fetch('/api/auth/forgot-password-mobile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, otp_id: otpId, password }),
                });
                const data = await res.json();
                if (data.success) {
                    goToStep(4);
                } else {
                    showError(data.message || 'Reset failed. Try again.');
                }
            } catch (e) {
                showError('Network error. Please try again.');
            }
            btn.disabled = false; btn.textContent = 'Reset Password';
        }

        document.getElementById('btnSendOtp').addEventListener('click', sendOtp);
        document.getElementById('btnVerifyOtp').addEventListener('click', verifyOtp);
        document.getElementById('btnBack1').addEventListener('click', () => goToStep(1));
        document.getElementById('btnReset').addEventListener('click', resetPassword);

        document.getElementById('mobile').addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); sendOtp(); }
        });
    </script>
</body>
</html>
