<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Estimate Requests - Quality Colours</title>
    <script src="/js/auth-helper.js?v=7101c516"></script>
    <script src="/js/pages/admin-estimate-requests-authguard.js?v=d4e2f9a1"></script>
    <link rel="stylesheet" href="/css/tailwind.css?v=849f1b5c">
    <link rel="stylesheet" href="/css/design-system.css?v=876c7d73">
    <script src="/universal-nav-loader.js?v=6b4a6dbe"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .status-new { background: #dbeafe; color: #1e40af; }
        .status-contacted { background: #fef3c7; color: #92400e; }
        .status-quote_sent { background: #ddd6fe; color: #5b21b6; }
        .status-accepted { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .status-completed { background: #e0e7ff; color: #3730a3; }
        
        .priority-low { border-left: 4px solid #9ca3af; }
        .priority-medium { border-left: 4px solid #3b82f6; }
        .priority-high { border-left: 4px solid #f59e0b; }
        .priority-urgent { border-left: 4px solid #ef4444; }

        @media (max-width: 768px) {
            .hide-mobile { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50" data-page="estimate-requests">
<!-- Page Header -->
    <div class="bg-white shadow-sm">
        <div class="px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">📋 Estimate Requests</h1>
                    <p class="text-gray-600 mt-1">Manage customer estimate requests & leads</p>
                </div>
                <div class="mt-4 sm:mt-0">
                    <button id="viewPublicFormBtn" class="bg-purple-600 text-white px-6 py-3 rounded-lg hover:bg-purple-700 transition shadow-lg">
                        View Public Form
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="px-4 sm:px-6 lg:px-8 py-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-lg shadow p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600">Total Requests</p>
                        <p class="text-2xl font-bold text-gray-800" id="statTotal">0</p>
                    </div>
                    <div class="text-3xl">📊</div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600">New (Pending)</p>
                        <p class="text-2xl font-bold text-blue-600" id="statNew">0</p>
                    </div>
                    <div class="text-3xl">🆕</div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600">Quotes Sent</p>
                        <p class="text-2xl font-bold text-purple-600" id="statQuotes">0</p>
                    </div>
                    <div class="text-3xl">📧</div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600">Last 24 Hours</p>
                        <p class="text-2xl font-bold text-green-600" id="stat24h">0</p>
                    </div>
                    <div class="text-3xl">⏰</div>
                </div>
            </div>
        </div>

        <!-- Status Filter Cards -->
        <div class="mb-6">
            <h3 class="text-sm font-semibold text-gray-700 mb-3">Filter by Status</h3>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-7 gap-3">
                <button data-status="" class="status-filter-card active border-2 border-purple-500 bg-purple-50 p-4 rounded-lg hover:shadow-md transition cursor-pointer text-center">
                    <div class="text-2xl mb-1">📊</div>
                    <div class="text-xs font-semibold text-gray-700">All</div>
                    <div class="text-lg font-bold text-purple-600" id="cardAll">0</div>
                </button>
                <button data-status="new" class="status-filter-card border-2 border-transparent bg-blue-50 p-4 rounded-lg hover:shadow-md transition cursor-pointer text-center">
                    <div class="text-2xl mb-1">🆕</div>
                    <div class="text-xs font-semibold text-gray-700">New</div>
                    <div class="text-lg font-bold text-blue-600" id="cardNew">0</div>
                </button>
                <button data-status="contacted" class="status-filter-card border-2 border-transparent bg-yellow-50 p-4 rounded-lg hover:shadow-md transition cursor-pointer text-center">
                    <div class="text-2xl mb-1">📞</div>
                    <div class="text-xs font-semibold text-gray-700">Contacted</div>
                    <div class="text-lg font-bold text-yellow-600" id="cardContacted">0</div>
                </button>
                <button data-status="quote_sent" class="status-filter-card border-2 border-transparent bg-purple-50 p-4 rounded-lg hover:shadow-md transition cursor-pointer text-center">
                    <div class="text-2xl mb-1">📧</div>
                    <div class="text-xs font-semibold text-gray-700">Quote Sent</div>
                    <div class="text-lg font-bold text-purple-600" id="cardQuoteSent">0</div>
                </button>
                <button data-status="accepted" class="status-filter-card border-2 border-transparent bg-green-50 p-4 rounded-lg hover:shadow-md transition cursor-pointer text-center">
                    <div class="text-2xl mb-1">✅</div>
                    <div class="text-xs font-semibold text-gray-700">Accepted</div>
                    <div class="text-lg font-bold text-green-600" id="cardAccepted">0</div>
                </button>
                <button data-status="rejected" class="status-filter-card border-2 border-transparent bg-red-50 p-4 rounded-lg hover:shadow-md transition cursor-pointer text-center">
                    <div class="text-2xl mb-1">❌</div>
                    <div class="text-xs font-semibold text-gray-700">Rejected</div>
                    <div class="text-lg font-bold text-red-600" id="cardRejected">0</div>
                </button>
                <button data-status="completed" class="status-filter-card border-2 border-transparent bg-indigo-50 p-4 rounded-lg hover:shadow-md transition cursor-pointer text-center">
                    <div class="text-2xl mb-1">🎉</div>
                    <div class="text-xs font-semibold text-gray-700">Completed</div>
                    <div class="text-lg font-bold text-indigo-600" id="cardCompleted">0</div>
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                    <select id="filterStatus" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                        <option value="">All Statuses</option>
                        <option value="new">New</option>
                        <option value="contacted">Contacted</option>
                        <option value="quote_sent">Quote Sent</option>
                        <option value="accepted">Accepted</option>
                        <option value="rejected">Rejected</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Priority</label>
                    <select id="filterPriority" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                        <option value="">All Priorities</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="urgent">Urgent</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Search</label>
                    <input type="text" id="searchInput" placeholder="Name, phone, request #" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                </div>
                <div class="flex items-end">
                    <button id="applyFiltersBtn" class="w-full bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700">
                        Apply Filters
                    </button>
                </div>
            </div>
        </div>

        <!-- Requests List -->
        <div class="bg-white rounded-lg shadow">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Request #</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Customer</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Project</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase hide-mobile">Area</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase hide-mobile">Created</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="requestsTableBody" class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="7" class="px-6 py-12 text-center">
                                <div class="text-gray-400">
                                    <div class="text-5xl mb-3">📋</div>
                                    <p>Loading requests...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Request Detail Modal -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4">
            <div class="bg-white rounded-xl shadow-2xl max-w-4xl w-full my-8">
                <div class="gradient-bg text-white px-6 py-4 rounded-t-xl flex justify-between items-center">
                    <h3 class="text-xl font-bold" id="modalTitle">Request Details</h3>
                    <button id="closeModalBtn" class="text-white hover:text-gray-200">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div id="modalContent" class="p-6 max-h-[70vh] overflow-y-auto">
                    <!-- Content loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <script src="/js/pages/admin-estimate-requests.js?v=8c1a4b7d"></script>
    <script src="/components/logo-loader.js"></script>
</body>
</html>
