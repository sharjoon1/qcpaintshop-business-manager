<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1B5E3B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Reset Password - Quality Colours Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1B5E3B 0%, #154D31 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="bg-white w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Set New Password</h1>
            <p class="text-green-200">Choose a strong password for your account</p>
        </div>

        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <div id="loadingState" class="text-center py-8">
                <svg class="inline w-8 h-8 animate-spin text-green-600" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="mt-4 text-gray-600 text-sm">Validating reset link...</p>
            </div>

            <div id="invalidState" class="hidden text-center py-4">
                <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-4 mb-4">
                    <svg class="w-10 h-10 mx-auto mb-2" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
                    </svg>
                    <p class="font-semibold">Reset link invalid or expired</p>
                    <p id="invalidReason" class="text-sm mt-1">This link can be used only once and is valid for 1 hour.</p>
                </div>
                <a href="/forgot-password.html" class="inline-block bg-green-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-green-700 transition">Request a new link</a>
            </div>

            <form id="resetForm" class="hidden">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">New Password</label>
                    <input type="password" id="password" minlength="8" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent transition"
                        placeholder="At least 8 characters" autocomplete="new-password">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Confirm Password</label>
                    <input type="password" id="confirmPassword" minlength="8" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent transition"
                        placeholder="Re-enter the password" autocomplete="new-password">
                </div>

                <div id="successMessage" class="hidden mb-4 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg text-sm">
                    <span id="successText"></span>
                </div>
                <div id="errorMessage" class="hidden mb-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
                    <span id="errorText"></span>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-gradient-to-r from-green-700 to-green-800 text-white py-3 rounded-lg font-semibold hover:from-green-800 hover:to-green-900 transition shadow-lg">
                    <span id="btnText">Set New Password</span>
                    <span id="btnLoader" class="hidden">
                        <svg class="inline w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Saving...
                    </span>
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/login.html" class="text-sm text-green-600 hover:text-green-800 font-medium">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const token = params.get('token') || '';
        const loadingState = document.getElementById('loadingState');
        const invalidState = document.getElementById('invalidState');
        const resetForm = document.getElementById('resetForm');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');

        async function validate() {
            if (!token) {
                loadingState.classList.add('hidden');
                invalidState.classList.remove('hidden');
                return;
            }
            try {
                const r = await fetch('/api/auth/validate-reset-token?token=' + encodeURIComponent(token));
                const data = await r.json();
                loadingState.classList.add('hidden');
                if (r.ok && data.success) {
                    resetForm.classList.remove('hidden');
                } else {
                    document.getElementById('invalidReason').textContent = data.message || 'This link can be used only once and is valid for 1 hour.';
                    invalidState.classList.remove('hidden');
                }
            } catch (e) {
                loadingState.classList.add('hidden');
                invalidState.classList.remove('hidden');
            }
        }
        validate();

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (password !== confirmPassword) {
                errorText.textContent = 'Passwords do not match.';
                errorMessage.classList.remove('hidden');
                return;
            }
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            submitBtn.disabled = true;
            try {
                const r = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await r.json();
                if (r.ok && data.success) {
                    successText.textContent = data.message + ' Redirecting to login...';
                    successMessage.classList.remove('hidden');
                    setTimeout(() => { location.href = '/login.html'; }, 2000);
                } else {
                    errorText.textContent = data.message || 'Failed to reset password.';
                    errorMessage.classList.remove('hidden');
                    btnText.classList.remove('hidden');
                    btnLoader.classList.add('hidden');
                    submitBtn.disabled = false;
                }
            } catch (err) {
                errorText.textContent = 'Network error. Please try again.';
                errorMessage.classList.remove('hidden');
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
