<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>View Estimate - Quality Colours</title>
    <script src="/js/auth-helper.js"></script>
    <script>checkAuthOrRedirect();</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            @page {
                size: A4;
                margin: 10mm;
            }
            .no-print { display: none !important; }
            body { 
                background: white; 
                margin: 0;
                padding: 0;
            }
            .print-container {
                width: 100%;
                max-width: 100%;
                margin: 0;
                padding: 0;
            }
            table {
                font-size: 9px !important;
                page-break-inside: avoid;
            }
            thead {
                display: table-header-group;
            }
            tr {
                page-break-inside: avoid;
            }
            .company-logo {
                max-height: 50px !important;
            }
            h1 {
                font-size: 18px !important;
            }
            h2 {
                font-size: 16px !important;
            }
        }

        .company-logo {
            max-height: 80px;
            max-width: 200px;
            object-fit: contain;
        }
    </style>
    <script src="/universal-nav-loader.js"></script>
</head>
<body class="bg-gray-50">
<!-- Action Bar (No Print) -->
    <div class="no-print fixed top-0 left-0 right-0 bg-white shadow-lg border-b" style="z-index: 1050;">
        <div class="px-4 py-3 flex items-center justify-between flex-wrap gap-2">
            <button onclick="history.back()" class="flex items-center text-gray-600 hover:text-gray-900">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back
            </button>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="toggleColumn('qty')" id="btn-qty" class="toggle-btn px-3 py-1 text-xs border-2 rounded-lg">Qty</button>
                <button onclick="toggleColumn('area')" id="btn-area" class="toggle-btn px-3 py-1 text-xs border-2 rounded-lg">Area</button>
                <button onclick="toggleColumn('mix')" id="btn-mix" class="toggle-btn px-3 py-1 text-xs border-2 rounded-lg">Mix</button>
                <button onclick="toggleColumn('price')" id="btn-price" class="toggle-btn px-3 py-1 text-xs border-2 rounded-lg">Base Price</button>
                <button onclick="toggleColumn('markup')" id="btn-markup" class="toggle-btn px-3 py-1 text-xs border-2 rounded-lg">Markup</button>
                <button onclick="toggleColumn('discount')" id="btn-discount" class="toggle-btn px-3 py-1 text-xs border-2 rounded-lg">Discount</button>
                <button onclick="toggleColumn('final')" id="btn-final" class="toggle-btn px-3 py-1 text-xs border-2 rounded-lg">Final Price</button>
                <button onclick="toggleColumn('breakdown')" id="btn-breakdown" class="toggle-btn px-3 py-1 text-xs border-2 rounded-lg">Breakdown</button>
                <button onclick="toggleColumn('color')" id="btn-color" class="toggle-btn px-3 py-1 text-xs border-2 rounded-lg">Color</button>
                <button onclick="toggleColumn('total')" id="btn-total" class="toggle-btn px-3 py-1 text-xs border-2 rounded-lg">Total</button>
                <button onclick="toggleSummary()" id="btn-summary" class="toggle-btn px-3 py-1 text-xs border-2 rounded-lg">Summary</button>
            </div>

            <div class="flex gap-2">
                <button onclick="shareViaWhatsApp()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 text-sm" title="Share via WhatsApp">
                    📱 WhatsApp
                </button>
                <button onclick="downloadPDF()" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 text-sm" title="Download PDF">
                    📄 PDF
                </button>
                <button onclick="editEstimate()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">
                    ✏️ Edit
                </button>
                <button onclick="window.open('estimate-print.html?id=' + estimateId, '_blank')" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 text-sm">
                    🖨️ Print
                </button>
            </div>
        </div>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="flex items-center justify-center py-20 mt-20">
        <svg class="w-12 h-12 animate-spin text-purple-600" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
    </div>

    <!-- Estimate Document -->
    <div id="mainContent" class="hidden print-container max-w-4xl mx-auto mt-20 no-print:mt-20 p-4 no-print:p-4 print:p-0 print:mt-0">
        <div class="bg-white shadow-2xl rounded-lg print:shadow-none print:rounded-none overflow-hidden">
            
            <!-- Header -->
            <div class="border-b-4 border-purple-600 p-6 print:p-4 bg-gradient-to-r from-purple-50 to-indigo-50 print:bg-white">
                <div class="flex items-start justify-between">
                    <!-- Company Info with Logo -->
                    <div class="flex items-start gap-4">
                        <img id="headerLogo" src="/logo.png" alt="Quality Colours" class="company-logo" onerror="this.style.display='none'">
                        <div>
                            <h1 class="text-3xl print:text-xl font-bold text-purple-900">Quality Colours</h1>
                            <p class="text-sm print:text-xs text-gray-600">குவாலிட்டி கலர்ஸ்</p>
                            <p class="text-sm print:text-xs text-gray-600 mt-2">
                                Ramanathapuram<br>
                                Phone: +91 7418831122<br>
                                Email: info@qcpaintshop.com<br>
                                GST: 33EMXPS2411G1ZT
                            </p>
                        </div>
                    </div>
                    
                    <!-- Estimate Info -->
                    <div class="text-right">
                        <h2 class="text-4xl print:text-2xl font-bold text-orange-600 mb-2">ESTIMATE</h2>
                        <p class="text-sm print:text-xs"><strong>Date:</strong> <span id="estimateDate"></span></p>
                        <p class="text-sm print:text-xs"><strong>Ref #:</strong> <span id="estimateNumber"></span></p>
                        <div id="statusBadge" class="mt-2 inline-block no-print"></div>
                    </div>
                </div>
            </div>

            <!-- Customer Info -->
            <div class="p-6 print:p-4 border-b">
                <h3 class="font-bold text-gray-700 mb-2 text-sm print:text-xs">BILL TO:</h3>
                <p class="text-lg print:text-sm font-bold" id="customerName"></p>
                <p class="text-sm print:text-xs" id="customerPhone"></p>
                <p class="text-sm print:text-xs" id="customerAddress"></p>
            </div>

            <!-- Items Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-sm print:text-xs" id="itemsTable">
                    <thead class="bg-gray-800 text-white">
                        <tr id="tableHead"></tr>
                    </thead>
                    <tbody id="itemsBody" class="divide-y divide-gray-200">
                        <tr>
                            <td colspan="10" class="text-center py-8 text-gray-500">Loading items...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Summary Section -->
            <div id="summarySection" class="p-6 print:p-4 bg-gray-50 print:bg-white">
                <div class="flex justify-end">
                    <div class="w-full max-w-sm">
                        <div id="extraSummaryLines"></div>
                        <div class="flex justify-between py-2 border-b text-sm print:text-xs" id="gstBreakdown" style="display: none;">
                            <span class="font-semibold">Subtotal (excl. GST):</span>
                            <span id="subtotalAmount"></span>
                        </div>
                        <div class="flex justify-between py-2 border-b text-sm print:text-xs" id="gstAmountRow" style="display: none;">
                            <span class="font-semibold">GST @18%:</span>
                            <span id="gstValue"></span>
                        </div>
                        <div class="flex justify-between py-3 text-xl print:text-base font-bold border-t-2 border-gray-300">
                            <span>Grand Total:</span>
                            <span class="text-purple-600">₹ <span id="grandTotal"></span></span>
                        </div>
                        <p class="text-xs print:text-[10px] text-gray-600 mt-2" id="amountInWords"></p>
                    </div>
                </div>
            </div>

            <!-- Notes -->
            <div id="notesSection" class="p-6 print:p-4 border-t" style="display: none;">
                <h3 class="font-bold text-gray-700 mb-2 text-sm print:text-xs">Notes:</h3>
                <p id="notesContent" class="text-sm print:text-xs text-gray-600"></p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const estimateId = urlParams.get('id');

        let cv = { qty: true, area: false, mix: true, price: true, markup: false, discount: false, final: false, breakdown: false, color: false, total: true };
        let showSummarySection = true;
        let estimateData = null;

        if (!estimateId) { alert('No estimate ID provided'); window.location.href = 'estimates.html'; }

        function r10(n) { return Math.ceil(n / 10) * 10; }
        function fmtINR(n) { return '\u20B9' + parseFloat(n || 0).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

        function toggleColumn(col) { cv[col] = !cv[col]; renderItems(); updateButtonStates(); }
        function toggleSummary() {
            showSummarySection = !showSummarySection;
            document.getElementById('summarySection').style.display = showSummarySection ? 'block' : 'none';
            updateButtonStates();
        }

        function updateButtonStates() {
            Object.keys(cv).forEach(col => {
                const btn = document.getElementById(`btn-${col}`);
                if (btn) {
                    if (cv[col]) { btn.className = 'toggle-btn px-3 py-1 text-xs border-2 rounded-lg bg-green-100 border-green-500 text-green-800'; }
                    else { btn.className = 'toggle-btn px-3 py-1 text-xs border-2 rounded-lg bg-gray-100 border-gray-300 text-gray-600'; }
                }
            });
            const sb = document.getElementById('btn-summary');
            if (sb) sb.className = 'toggle-btn px-3 py-1 text-xs border-2 rounded-lg ' + (showSummarySection ? 'bg-green-100 border-green-500 text-green-800' : 'bg-gray-100 border-gray-300 text-gray-600');
        }

        async function loadEstimate() {
            try {
                const response = await apiRequest(`/api/estimates/${estimateId}`);
                if (!response.ok) throw new Error('Estimate not found');
                estimateData = await response.json();
                if (!estimateData || !estimateData.estimate_number) throw new Error('Estimate not found');

                document.getElementById('estimateNumber').textContent = estimateData.estimate_number;
                document.getElementById('estimateDate').textContent = formatDate(estimateData.estimate_date);
                document.getElementById('statusBadge').innerHTML = getStatusBadge(estimateData.status);
                document.getElementById('customerName').textContent = estimateData.customer_name || '';
                document.getElementById('customerPhone').textContent = estimateData.customer_phone || '';
                document.getElementById('customerAddress').textContent = estimateData.customer_address || '';

                if (estimateData.notes && estimateData.notes.trim()) {
                    document.getElementById('notesContent').textContent = estimateData.notes;
                    document.getElementById('notesSection').style.display = 'block';
                }

                // Load column visibility
                if (estimateData.column_visibility) {
                    try {
                        const s = JSON.parse(estimateData.column_visibility);
                        if (s.show_qty !== undefined) cv.qty = s.show_qty;
                        if (s.show_area !== undefined) cv.area = s.show_area;
                        if (s.show_mix !== undefined) cv.mix = s.show_mix;
                        if (s.show_price !== undefined) cv.price = s.show_price;
                        if (s.show_color !== undefined) cv.color = s.show_color;
                        if (s.show_total !== undefined) cv.total = s.show_total;
                        if (s.show_breakdown !== undefined) cv.breakdown = s.show_breakdown;
                    } catch (e) {}
                }

                renderItems();
                updateButtonStates();

                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
            } catch (error) {
                console.error('Error loading estimate:', error);
                alert('Failed to load estimate: ' + error.message);
                window.location.href = 'estimates.html';
            }
        }

        function renderItems() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('itemsBody');
            const items = estimateData.items || [];
            const globalDescOnly = !!estimateData.show_description_only;

            const products = items.filter(i => i.item_type !== 'labor');
            const labor = items.filter(i => i.item_type === 'labor');

            // Build header
            let hh = '<th class="px-3 py-2 text-left" style="width:30px">#</th><th class="px-3 py-2 text-left">ITEM DETAILS</th>';
            if (cv.qty) hh += '<th class="px-3 py-2 text-right">QTY</th>';
            if (cv.area) hh += '<th class="px-3 py-2 text-right">AREA</th>';
            if (cv.mix) hh += '<th class="px-3 py-2 text-left">MIX INFO</th>';
            if (cv.price) hh += '<th class="px-3 py-2 text-right">BASE PRICE</th>';
            if (cv.markup) hh += '<th class="px-3 py-2 text-right">MARKUP</th>';
            if (cv.discount) hh += '<th class="px-3 py-2 text-right">DISCOUNT</th>';
            if (cv.final) hh += '<th class="px-3 py-2 text-right">FINAL PRICE</th>';
            if (cv.breakdown) hh += '<th class="px-3 py-2 text-left">BREAKDOWN</th>';
            if (cv.color) hh += '<th class="px-3 py-2 text-right">COLOR</th>';
            if (cv.total) hh += '<th class="px-3 py-2 text-right">TOTAL</th>';
            thead.innerHTML = hh;
            const colCount = thead.querySelectorAll('th').length;

            if (products.length === 0 && labor.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${colCount}" class="text-center py-8 text-gray-500">No items</td></tr>`;
                updateSummary(products, labor);
                return;
            }

            let rows = products.map((item, i) => {
                const showDescOnly = item.show_description_only != null ? !!item.show_description_only : globalDescOnly;
                const name = showDescOnly && item.custom_description ? item.custom_description : (item.item_description || item.product_name || item.item_name || '');
                const descLine = (!showDescOnly && item.custom_description) ? `<div class="text-xs text-gray-400 mt-0.5" style="white-space:pre-line">${item.custom_description}</div>` : '';

                let r = `<td class="px-3 py-2 text-center">${i + 1}</td>`;
                r += `<td class="px-3 py-2"><div class="font-semibold" style="white-space:pre-line">${name}</div>${descLine}</td>`;
                if (cv.qty) r += `<td class="px-3 py-2 text-right">${parseFloat(item.quantity || 0).toFixed(2)}</td>`;
                if (cv.area) r += `<td class="px-3 py-2 text-right">${item.area ? parseFloat(item.area).toFixed(0) + ' sqft' : '-'}</td>`;
                if (cv.mix) r += `<td class="px-3 py-2 text-xs text-gray-500">${item.mix_info || '-'}</td>`;
                if (cv.price) r += `<td class="px-3 py-2 text-right">${fmtINR(r10(parseFloat(item.base_price || item.unit_price) || 0))}</td>`;
                if (cv.markup) {
                    if (item.markup_type && parseFloat(item.markup_amount) > 0) {
                        const lbl = item.markup_type.includes('pct') ? item.markup_value + '%' : fmtINR(item.markup_value);
                        r += `<td class="px-3 py-2 text-right text-green-600">+${lbl}</td>`;
                    } else r += '<td class="px-3 py-2 text-right">-</td>';
                }
                if (cv.discount) {
                    if (item.discount_type && parseFloat(item.discount_amount) > 0) {
                        const lbl = item.discount_type.includes('pct') ? item.discount_value + '%' : fmtINR(item.discount_value);
                        r += `<td class="px-3 py-2 text-right text-red-600">-${lbl}</td>`;
                    } else r += '<td class="px-3 py-2 text-right">-</td>';
                }
                if (cv.final) r += `<td class="px-3 py-2 text-right font-semibold">${fmtINR(r10(parseFloat(item.final_price || item.unit_price) || 0))}</td>`;
                if (cv.breakdown) r += `<td class="px-3 py-2">${item.breakdown_cost || '-'}</td>`;
                if (cv.color) r += `<td class="px-3 py-2 text-right">${fmtINR(item.color_cost || 0)}</td>`;
                if (cv.total) r += `<td class="px-3 py-2 text-right font-bold">${fmtINR(r10(parseFloat(item.line_total) || 0))}</td>`;
                return `<tr class="print:text-xs">${r}</tr>`;
            }).join('');

            if (labor.length > 0) {
                rows += `<tr class="bg-gray-100"><td colspan="${colCount}" class="px-3 py-2 font-bold text-sm border-t-2">Labor Charges</td></tr>`;
                labor.forEach((l, i) => {
                    let r = `<td class="px-3 py-2 text-center">${products.length + i + 1}</td>`;
                    r += `<td class="px-3 py-2 font-semibold">${l.labor_description || l.item_name || 'Labor'}</td>`;
                    const midCols = [cv.qty, cv.area, cv.mix, cv.price, cv.markup, cv.discount, cv.final, cv.breakdown, cv.color].filter(Boolean).length;
                    for (let c = 0; c < midCols; c++) r += '<td></td>';
                    if (cv.total) r += `<td class="px-3 py-2 text-right font-bold">${fmtINR(r10(parseFloat(l.line_total || l.base_price) || 0))}</td>`;
                    rows += `<tr class="print:text-xs">${r}</tr>`;
                });
            }

            tbody.innerHTML = rows;
            updateSummary(products, labor);
        }

        function updateSummary(products, labor) {
            let productTotal = 0, totalMarkup = 0, totalDiscount = 0, laborTotal = 0;
            products.forEach(i => {
                productTotal += r10(parseFloat(i.line_total) || 0);
                totalMarkup += (parseFloat(i.markup_amount) || 0) * (parseFloat(i.quantity) || 1);
                totalDiscount += (parseFloat(i.discount_amount) || 0) * (parseFloat(i.quantity) || 1);
            });
            if (parseFloat(estimateData.total_markup) > 0) totalMarkup = parseFloat(estimateData.total_markup);
            if (parseFloat(estimateData.total_discount) > 0) totalDiscount = parseFloat(estimateData.total_discount);
            labor.forEach(i => { laborTotal += r10(parseFloat(i.line_total || i.base_price) || 0); });
            const grandTotal = r10(productTotal + laborTotal);

            document.getElementById('grandTotal').textContent = parseFloat(grandTotal).toLocaleString('en-IN', { minimumFractionDigits: 2 });
            document.getElementById('amountInWords').textContent = 'Amount in Words: Rupees ' + Math.floor(grandTotal).toLocaleString('en-IN') + ' Only';

            if (estimateData.show_gst_breakdown) {
                document.getElementById('subtotalAmount').textContent = fmtINR(productTotal);
                document.getElementById('gstValue').textContent = fmtINR(parseFloat(estimateData.gst_amount) || 0);
                document.getElementById('gstBreakdown').style.display = 'flex';
                document.getElementById('gstAmountRow').style.display = 'flex';
            }

            let html = '';
            if (totalMarkup > 0 || totalDiscount > 0 || laborTotal > 0) {
                html += `<div class="flex justify-between py-1 text-sm"><span class="text-gray-500">Subtotal (products):</span><span class="font-medium">${fmtINR(productTotal)}</span></div>`;
            }
            if (totalMarkup > 0) html += `<div class="flex justify-between py-1 text-sm text-green-600"><span>Total Markup:</span><span>+${fmtINR(r10(totalMarkup))}</span></div>`;
            if (totalDiscount > 0) html += `<div class="flex justify-between py-1 text-sm text-red-600"><span>Total Discount:</span><span>-${fmtINR(r10(totalDiscount))}</span></div>`;
            if (laborTotal > 0) html += `<div class="flex justify-between py-1 text-sm text-blue-600"><span>Labor Charges:</span><span>+${fmtINR(laborTotal)}</span></div>`;
            if (html) html += '<div class="border-t border-gray-300 my-1"></div>';
            document.getElementById('extraSummaryLines').innerHTML = html;
        }

        function getStatusBadge(status) {
            const badges = {
                'draft': '<span class="px-3 py-1 text-xs font-semibold rounded-full bg-gray-500 text-white">🆕 Draft</span>',
                'sent': '<span class="px-3 py-1 text-xs font-semibold rounded-full bg-blue-500 text-white">📧 Sent</span>',
                'pending_approval': '<span class="px-3 py-1 text-xs font-semibold rounded-full bg-yellow-500 text-white">⏳ Pending</span>',
                'approved': '<span class="px-3 py-1 text-xs font-semibold rounded-full bg-green-500 text-white">✅ Approved</span>',
                'rejected': '<span class="px-3 py-1 text-xs font-semibold rounded-full bg-red-500 text-white">❌ Rejected</span>',
                'converted': '<span class="px-3 py-1 text-xs font-semibold rounded-full bg-purple-500 text-white">📄 Converted</span>',
                'expired': '<span class="px-3 py-1 text-xs font-semibold rounded-full bg-orange-500 text-white">⌛ Expired</span>'
            };
            return badges[status] || badges['draft'];
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-IN', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        function editEstimate() {
            window.location.href = `estimate-create-new.html?id=${estimateId}`;
        }

        async function shareViaWhatsApp() {
            try {
                const r = await apiRequest('/api/share/whatsapp', {
                    method: 'POST',
                    headers: { ...getAuthHeaders() },
                    body: JSON.stringify({ resource_type: 'estimate', resource_id: estimateId })
                });
                const result = await r.json();
                if (result.success && result.data.whatsapp_url) {
                    window.open(result.data.whatsapp_url, '_blank');
                } else {
                    alert(result.message || 'Failed to generate share link');
                }
            } catch (err) {
                console.error('WhatsApp share error:', err);
                alert('Failed to share. Please try again.');
            }
        }

        function downloadPDF() {
            const token = localStorage.getItem('auth_token');
            // Check if running in Android WebView
            const ua = navigator.userAgent || '';
            if (ua.includes('QCManagerApp')) {
                // Android: use direct URL with token param for DownloadManager
                window.location.href = `/api/estimates/${estimateId}/pdf?token=${token}`;
            } else {
                // Browser: fetch as blob and trigger download
                fetch(`/api/estimates/${estimateId}/pdf`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(r => {
                    if (!r.ok) throw new Error('PDF generation failed');
                    return r.blob();
                }).then(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Estimate-${estimateId}.pdf`;
                    a.click();
                    URL.revokeObjectURL(url);
                }).catch(err => {
                    console.error('PDF download error:', err);
                    alert('Failed to download PDF');
                });
            }
        }

        // Initialize
        loadEstimate();
    </script>
    <script src="/components/logo-loader.js"></script>
</body>
</html>
