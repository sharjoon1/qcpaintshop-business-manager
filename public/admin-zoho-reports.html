<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Financial Reports - Quality Colours Manager</title>
    <link rel="stylesheet" href="/css/tailwind.css?v=849f1b5c">
    <link rel="stylesheet" href="/css/design-system.css?v=876c7d73">
    <link rel="stylesheet" href="/css/zoho-common.css?v=b2e96640">
    <script src="/universal-nav-loader.js?v=6b4a6dbe"></script>
    <script src="/js/auth-helper.js?v=7101c516"></script>
    <script src="/js/pages/admin-zoho-reports-authguard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        .report-table th { position: sticky; top: 0; background: #f9fafb; z-index: 1; }
        .report-table tr:hover td { background: #f3f4f6; }
        .pill-btn { transition: all 0.2s; }
        .pill-btn:focus { outline: 2px solid #9333ea; outline-offset: 2px; }
        .spinner { border: 3px solid #e5e7eb; border-top-color: #7c3aed; border-radius: 50%; width: 2rem; height: 2rem; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .pills-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .pills-scroll::-webkit-scrollbar { display: none; }
        /* ─── MOBILE: admin-zoho-reports.html ─── */
        @media (max-width: 639px) {
            .report-table { font-size: 0.7rem; }
            .report-table th, .report-table td { padding: 0.375rem 0.5rem; }
            .container, .p-6 { padding: 12px !important; }
            .grid.grid-cols-4, .grid.grid-cols-3 { grid-template-columns: repeat(2, 1fr) !important; }
            select { width: 100% !important; min-height: 44px !important; }
            canvas, .chart-container { width: 100% !important; }
            input[type="date"] { width: 100% !important; min-height: 44px !important; display: block !important; margin-bottom: 8px !important; }
            button#exportCsvBtn, .export-btn {
                width: 100% !important; min-height: 48px !important; margin-bottom: 8px !important;
            }
            table td:first-child, table th:first-child {
                position: sticky !important; left: 0 !important; background: #fff !important; z-index: 1 !important;
            }
        }
    </style>
</head>
<body class="bg-gray-50" data-page="zoho-reports">

    <!-- Main Content -->
    <div class="min-h-screen">
        <!-- Page Header -->
        <div class="bg-white shadow-sm px-4 sm:px-6 lg:px-8 py-6">
            <h2 class="text-2xl font-bold text-gray-800">Financial Reports</h2>
            <p class="text-gray-600 text-sm mt-1">Zoho Books financial analysis</p>
        </div>

        <div class="container mx-auto p-4 md:p-6">

            <!-- Report Type Selector -->
            <div class="mb-6">
                <div class="pills-scroll">
                    <div class="flex flex-nowrap gap-2" id="reportTabs">
                        <button data-report="profit_loss"
                            class="pill-btn flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap bg-purple-600 text-white">
                            Profit &amp; Loss
                        </button>
                        <button data-report="balance_sheet"
                            class="pill-btn flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap bg-white text-gray-700 border hover:bg-gray-50">
                            Balance Sheet
                        </button>
                        <button data-report="sales_by_customer"
                            class="pill-btn flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap bg-white text-gray-700 border hover:bg-gray-50">
                            Sales by Customer
                        </button>
                        <button data-report="sales_by_item"
                            class="pill-btn flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap bg-white text-gray-700 border hover:bg-gray-50">
                            Sales by Item
                        </button>
                        <button data-report="receivables"
                            class="pill-btn flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap bg-white text-gray-700 border hover:bg-gray-50">
                            Receivables Summary
                        </button>
                        <button data-report="aging"
                            class="pill-btn flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap bg-white text-gray-700 border hover:bg-gray-50">
                            Aging Report
                        </button>
                    </div>
                </div>
            </div>

            <!-- Date Range Picker -->
            <div class="bg-white rounded-lg shadow p-4 mb-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
                    <div id="fromDateGroup">
                        <label class="block text-sm font-medium text-gray-700 mb-1">From Date</label>
                        <input type="date" id="fromDate"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-500 focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">To Date</label>
                        <input type="date" id="toDate"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-500 focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Quick Presets</label>
                        <select id="datePreset"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-500 focus:border-purple-500">
                            <option value="">-- Select Preset --</option>
                            <option value="this_month">This Month</option>
                            <option value="last_month">Last Month</option>
                            <option value="this_quarter">This Quarter</option>
                            <option value="this_fy">This Year (FY)</option>
                            <option value="last_fy">Last Year (FY)</option>
                        </select>
                    </div>
                    <div>
                        <button id="generateReportBtn"
                            class="w-full bg-purple-600 text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-purple-700 transition focus:ring-2 focus:ring-purple-500 focus:ring-offset-2">
                            Generate Report
                        </button>
                    </div>
                </div>
                <div class="mt-3 flex items-center gap-2">
                    <input type="checkbox" id="useCached" checked
                        class="rounded border-gray-300 text-purple-600 focus:ring-purple-500">
                    <label for="useCached" class="text-sm text-gray-600">Use cached data</label>
                </div>
            </div>

            <!-- Cache Indicator -->
            <div id="cacheIndicator" class="hidden mb-4 bg-yellow-50 border border-yellow-200 rounded-lg px-4 py-3 flex items-center justify-between">
                <span class="text-sm text-yellow-800" id="cacheMessage">Cached data from --. Click to refresh.</span>
                <button id="refreshReportBtn" class="text-sm text-purple-600 font-medium hover:text-purple-800 underline">Refresh</button>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="hidden">
                <div class="bg-white rounded-lg shadow p-12 flex flex-col items-center justify-center">
                    <div class="spinner mb-4"></div>
                    <p class="text-gray-500 text-sm">Loading report data...</p>
                </div>
            </div>

            <!-- Error State -->
            <div id="errorState" class="hidden">
                <div class="bg-white rounded-lg shadow p-12 flex flex-col items-center justify-center">
                    <svg class="w-12 h-12 text-red-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
                    </svg>
                    <p class="text-gray-700 font-medium mb-1" id="errorTitle">Failed to load report</p>
                    <p class="text-gray-500 text-sm mb-4" id="errorMessage">An error occurred while fetching the report.</p>
                    <button id="retryReportBtn"
                        class="bg-purple-600 text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-purple-700 transition">
                        Retry
                    </button>
                </div>
            </div>

            <!-- Empty / Initial State -->
            <div id="initialState">
                <div class="bg-white rounded-lg shadow p-12 flex flex-col items-center justify-center">
                    <svg class="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <p class="text-gray-500 text-sm">Select a report type, choose a date range, and click "Generate Report".</p>
                </div>
            </div>

            <!-- Report Display Area -->
            <div id="reportArea" class="hidden">
                <!-- Summary Cards -->
                <div id="summaryCards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-6"></div>

                <!-- P&L Chart (shown for profit_loss report) -->
                <div id="plChartContainer" class="hidden bg-white rounded-lg shadow p-4 mb-4">
                    <h3 class="text-sm font-semibold text-gray-600 mb-3">Income vs Expense vs Profit</h3>
                    <div style="max-height: 220px; position: relative;">
                        <canvas id="plChart"></canvas>
                    </div>
                </div>

                <!-- Report Toolbar (shown after report loads) -->
                <div class="flex justify-end mb-3">
                    <button id="exportCsvBtn" class="flex items-center gap-2 px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-medium rounded-lg transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Export CSV
                    </button>
                </div>

                <!-- Report Table -->
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="report-table w-full text-sm" id="reportTable">
                            <thead id="reportTableHead"></thead>
                            <tbody id="reportTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="/js/pages/admin-zoho-reports.js"></script>
</body>
</html>
