<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Role Permissions - Quality Colours</title>
    <script src="/js/auth-helper.js?v=7101c516"></script>
    <script src="/js/pages/admin-role-permissions-authguard.js"></script>
    <link rel="stylesheet" href="/css/tailwind.css?v=849f1b5c">
    <link rel="stylesheet" href="/css/design-system.css?v=876c7d73">
    <script src="/universal-nav-loader.js?v=6b4a6dbe"></script>
</head>
<body class="bg-gray-50" data-page="permissions">
    <!-- Header -->
    <div class="bg-gradient-to-r from-purple-600 to-indigo-600 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between flex-wrap gap-2">
                <div class="flex items-center gap-4">
                    <a href="/admin-roles.html" class="text-white hover:text-purple-200 transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                    </a>
                    <div>
                        <h1 class="text-white text-xl font-bold">Edit Role Permissions</h1>
                        <p class="text-purple-100 text-sm" id="roleName">Select a role below</p>
                    </div>
                </div>
                <button id="saveBtn" class="hidden bg-white text-purple-600 px-3 py-2 sm:px-6 rounded-lg hover:bg-purple-50 transition shadow-lg font-semibold text-sm">
                    Save Permissions
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 py-6">

        <!-- Role Selector (shown when no role_id in URL) -->
        <div id="roleSelectorCard" class="hidden bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Select a Role to Manage Permissions</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="roleCards">
                <div class="text-center py-8 col-span-full text-gray-500">Loading roles...</div>
            </div>
        </div>

        <!-- Permission Summary -->
        <div id="summaryCard" class="hidden bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-bold text-gray-800">Permission Summary</h2>
                    <p class="text-sm text-gray-600">Total Permissions: <span id="totalPermissions" class="font-semibold">0</span></p>
                </div>
                <div>
                    <p class="text-sm text-gray-600">Selected: <span id="selectedCount" class="font-semibold text-purple-600">0</span> / <span id="availableCount">0</span></p>
                </div>
            </div>
        </div>

        <!-- Search and Filters -->
        <div id="searchCard" class="hidden bg-white rounded-lg shadow-md p-4 mb-6">
            <div class="flex flex-wrap gap-4 items-center">
                <input type="text" id="searchPermissions" placeholder="Search permissions..." class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                <button id="selectAllBtn" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                    Select All
                </button>
                <button id="deselectAllBtn" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
                    Deselect All
                </button>
            </div>
        </div>

        <!-- Permissions by Module -->
        <div id="permissionsContainer" class="space-y-4"></div>

    </div>

    <script src="/js/pages/admin-role-permissions.js"></script>
</body>
</html>
