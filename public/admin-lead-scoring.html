<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png">
    <title>AI Lead Scoring - Quality Colours Manager</title>
    <link rel="stylesheet" href="/css/tailwind.css?v=849f1b5c">
    <link rel="stylesheet" href="/css/design-system.css?v=876c7d73">
    <script src="/universal-nav-loader.js?v=fb16cb40"></script>
    <script src="/js/auth-helper.js?v=7101c516"></script>
    <script src="/js/pages/admin-lead-scoring-authguard.js?v=c10a0001"></script>
    <style>
        .score-ring { transition: stroke-dashoffset 0.6s ease; }
        .tier-hot { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .tier-warm { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .tier-cold { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .tier-unscored { background: linear-gradient(135deg, #9ca3af, #6b7280); }
        .slide-panel { transform: translateX(100%); transition: transform 0.3s ease; }
        .slide-panel.open { transform: translateX(0); }
        .slide-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .slide-overlay.open { opacity: 1; pointer-events: auto; }
        .factor-positive { color: #16a34a; }
        .factor-negative { color: #dc2626; }
        .factor-neutral { color: #9ca3af; }
        .breakdown-bar { height: 8px; border-radius: 4px; background: #e5e7eb; overflow: hidden; }
        .breakdown-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .nurture-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-50" data-page="lead-scoring">

<div class="container mx-auto p-4 md:p-6 max-w-7xl">
    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">AI Lead Scoring</h1>
            <p class="text-sm text-gray-500 mt-1" id="lastRunInfo">Loading...</p>
        </div>
        <button id="runScoringBtn"
            class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-white font-medium text-sm"
            style="background: linear-gradient(135deg, #667eea, #764ba2);">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            Run Scoring Now
        </button>
    </div>

    <!-- A. Score Overview Cards -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6" id="overviewCards">
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-center">
            <div class="text-2xl font-bold text-gray-800" id="avgScore">--</div>
            <div class="text-xs text-gray-500 mt-1">Avg Score</div>
        </div>
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-center">
            <div class="text-2xl font-bold text-red-500" id="hotCount">--</div>
            <div class="text-xs text-gray-500 mt-1">Hot (80+)</div>
        </div>
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-center">
            <div class="text-2xl font-bold text-amber-500" id="warmCount">--</div>
            <div class="text-xs text-gray-500 mt-1">Warm (50-79)</div>
        </div>
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-center">
            <div class="text-2xl font-bold text-blue-500" id="coldCount">--</div>
            <div class="text-xs text-gray-500 mt-1">Cold (&lt;50)</div>
        </div>
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-center col-span-2 md:col-span-1">
            <div class="text-2xl font-bold text-purple-500" id="predictedCount">--</div>
            <div class="text-xs text-gray-500 mt-1">Predicted Conversions</div>
        </div>
    </div>

    <!-- B. Score Distribution Bar -->
    <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 mb-6">
        <div class="text-sm font-medium text-gray-700 mb-3">Score Distribution</div>
        <div class="flex rounded-full overflow-hidden h-6" id="distributionBar">
            <div class="bg-gray-200 w-full flex items-center justify-center text-xs text-gray-400">Loading...</div>
        </div>
        <div class="flex flex-wrap gap-4 mt-3 text-xs" id="distributionLegend"></div>
    </div>

    <!-- C. Nurture Actions -->
    <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 mb-6">
        <div class="text-sm font-medium text-gray-700 mb-3">WhatsApp Nurture Campaigns</div>
        <div class="flex flex-wrap gap-3">
            <button class="nurture-btn inline-flex items-center gap-2 px-4 py-2 rounded-lg text-white text-sm font-medium tier-hot" id="nurtureHot">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/></svg>
                Nurture Hot Leads
            </button>
            <button class="nurture-btn inline-flex items-center gap-2 px-4 py-2 rounded-lg text-white text-sm font-medium tier-warm" id="nurtureWarm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707"/></svg>
                Nurture Warm Leads
            </button>
            <button class="nurture-btn inline-flex items-center gap-2 px-4 py-2 rounded-lg text-white text-sm font-medium tier-cold" id="nurtureCold">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                Nurture Cold Leads
            </button>
        </div>
    </div>

    <!-- D. Top Leads Table -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 mb-6 overflow-hidden">
        <div class="p-4 border-b border-gray-100">
            <div class="text-sm font-medium text-gray-700">Top Scored Leads</div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left font-medium text-gray-500">Score</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-500">Lead</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-500 hidden md:table-cell">Status</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-500 hidden lg:table-cell">Budget</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-500 hidden lg:table-cell">AI Recommendation</th>
                        <th class="px-4 py-3 text-right font-medium text-gray-500">Actions</th>
                    </tr>
                </thead>
                <tbody id="leadsTableBody">
                    <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- E. Lead Detail Slide-out Panel -->
<div class="slide-overlay fixed inset-0 bg-black/40 z-50" id="slideOverlay"></div>
<div class="slide-panel fixed top-0 right-0 h-full w-full sm:w-[480px] bg-white shadow-2xl z-50 overflow-y-auto" id="detailPanel">
    <div class="sticky top-0 bg-white border-b border-gray-100 p-4 flex items-center justify-between z-10">
        <h3 class="text-lg font-bold text-gray-800" id="detailLeadName">Lead Detail</h3>
        <button id="closeDetailPanelBtn" class="p-1 rounded-lg hover:bg-gray-100">
            <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
    </div>
    <div class="p-4 space-y-6" id="detailContent">
        <div class="text-center text-gray-400 py-8">Select a lead to view details</div>
    </div>
</div>

<script src="/js/pages/admin-lead-scoring.js?v=c10a0002"></script>
</body>
</html>
