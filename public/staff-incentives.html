<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1B5E3B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>My Incentives - QC Paint Shop</title>
    <link rel="stylesheet" href="/css/tailwind.css?v=849f1b5c">
    <link rel="stylesheet" href="/css/design-system.css?v=876c7d73">
    <script src="/universal-nav-loader.js?v=6b4a6dbe"></script>
    <script src="/js/auth-helper.js?v=7101c516"></script>
    <script src="/js/pages/staff-incentives-authguard.js"></script>
    <style>
        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { background: #f8fafc; }

        .incentive-card {
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        @media (hover: hover) {
            .incentive-card:hover { transform: translateY(-1px); box-shadow: 0 6px 20px -4px rgba(0,0,0,0.1); }
        }
    </style>
</head>
<body data-page="my-incentives" class="min-h-screen">

    <!-- Page Header -->
    <div class="max-w-lg mx-auto flex items-center justify-between px-4 py-3">
        <div>
            <h1 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                <span class="text-xl">&#127942;</span> My Incentives
            </h1>
            <p class="text-xs text-gray-500">Lead conversion rewards</p>
        </div>
        <div class="flex items-center gap-2">
            <button id="requestBtn" class="text-sm bg-gradient-to-r from-green-500 to-teal-600 text-white px-3 py-1.5 rounded-lg font-semibold">
                + Request
            </button>
            <select id="filterMonth" class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 bg-white focus:ring-2 focus:ring-green-300 focus:border-green-400">
            </select>
        </div>
    </div>

    <!-- Summary Cards -->
    <div class="max-w-lg mx-auto px-4 pb-2">
        <div class="grid grid-cols-3 gap-3">
            <div class="bg-gradient-to-br from-green-500 to-teal-600 rounded-xl p-3 text-white">
                <div class="text-xs opacity-80">Conversions</div>
                <div class="text-2xl font-bold mt-1" id="totalConversions">0</div>
            </div>
            <div class="bg-gradient-to-br from-green-500 to-emerald-600 rounded-xl p-3 text-white">
                <div class="text-xs opacity-80">Approved</div>
                <div class="text-xl font-bold mt-1" id="approvedAmt">&#8377;0</div>
            </div>
            <div class="bg-gradient-to-br from-amber-400 to-orange-500 rounded-xl p-3 text-white">
                <div class="text-xs opacity-80">Pending</div>
                <div class="text-xl font-bold mt-1" id="pendingAmt">&#8377;0</div>
            </div>
        </div>
    </div>

    <!-- Type Breakdown -->
    <div class="max-w-lg mx-auto px-4 py-2">
        <div class="flex gap-2 overflow-x-auto scroll-hide pb-1" id="typeBreakdown">
        </div>
    </div>

    <!-- Filter Tabs -->
    <div class="max-w-lg mx-auto px-4 py-2">
        <div class="flex gap-2 bg-white rounded-xl p-1 shadow-sm border border-gray-100">
            <button class="filter-tab flex-1 py-2 text-xs font-semibold rounded-lg transition bg-green-50 text-green-700" data-status="">All</button>
            <button class="filter-tab flex-1 py-2 text-xs font-semibold rounded-lg transition text-gray-500" data-status="approved">Approved</button>
            <button class="filter-tab flex-1 py-2 text-xs font-semibold rounded-lg transition text-gray-500" data-status="pending">Pending</button>
            <button class="filter-tab flex-1 py-2 text-xs font-semibold rounded-lg transition text-gray-500" data-status="rejected">Rejected</button>
        </div>
    </div>

    <!-- Incentive List -->
    <div class="max-w-lg mx-auto px-4 py-3">
        <div id="loading" class="text-center py-12 text-gray-400">
            <svg class="w-8 h-8 mx-auto animate-spin text-green-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
            <p class="mt-2 text-sm">Loading incentives...</p>
        </div>
        <div id="emptyState" class="text-center py-16 hidden">
            <div class="text-5xl mb-3 opacity-30">&#127942;</div>
            <h3 class="text-gray-500 font-semibold">No incentives yet</h3>
            <p class="text-gray-400 text-sm mt-1">Convert leads and close sales to earn incentives!</p>
        </div>
        <div id="incentiveList" class="space-y-3 hidden"></div>
    </div>

    <!-- Bottom spacing for mobile nav -->
    <div class="h-20"></div>

    <!-- Request Incentive Modal -->
    <div id="requestModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center">
        <div class="bg-white rounded-2xl p-6 mx-4 max-w-sm w-full shadow-2xl">
            <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
                <span class="text-xl">&#128176;</span> Request Incentive
            </h3>
            <p class="text-xs text-gray-500 mb-4">For direct Zoho billing (not via estimate system)</p>
            <div class="space-y-3">
                <div>
                    <label class="text-xs font-semibold text-gray-600 block mb-1">Invoice/Bill Amount *</label>
                    <input type="number" id="reqAmount" placeholder="e.g. 25000" min="1" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-300">
                    <p class="text-[11px] text-gray-400 mt-1">Incentive slab will be auto-calculated</p>
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-600 block mb-1">Zoho Invoice Reference *</label>
                    <input type="text" id="reqInvoiceRef" placeholder="e.g. INV-00123" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-300">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-600 block mb-1">Notes</label>
                    <textarea id="reqNotes" rows="2" placeholder="Any details..." class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-300"></textarea>
                </div>
            </div>
            <div class="flex gap-3 mt-5">
                <button id="cancelBtn" class="flex-1 py-2 text-sm font-semibold text-gray-600 bg-gray-100 rounded-lg">Cancel</button>
                <button id="submitBtn" class="flex-1 py-2 text-sm font-semibold text-white bg-gradient-to-r from-green-500 to-teal-600 rounded-lg">Submit</button>
            </div>
        </div>
    </div>

    <script src="/js/pages/staff-incentives.js"></script>
</body>
</html>
