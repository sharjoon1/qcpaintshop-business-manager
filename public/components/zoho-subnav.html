<!-- Zoho Sub-Navigation Component -->
<style>
    .zoho-subnav {
        background: #ffffff;
        border-bottom: 1px solid #e8ecf1;
        position: sticky;
        top: 0;
        z-index: 999;
        padding: 0;
    }

    .zoho-subnav-inner {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 1rem;
        position: relative;
    }

    /* Desktop: Horizontal scrollable tabs */
    .zoho-subnav-tabs {
        display: flex;
        gap: 4px;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        padding: 0.5rem 0;
    }
    .zoho-subnav-tabs::-webkit-scrollbar { display: none; }

    .zoho-subnav-tab {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 8px;
        font-size: 0.8125rem;
        font-weight: 500;
        color: #64748b;
        text-decoration: none;
        white-space: nowrap;
        transition: all 0.2s ease;
        border: 1px solid transparent;
        flex-shrink: 0;
    }
    .zoho-subnav-tab:hover {
        background: #f1f5f9;
        color: #334155;
    }
    .zoho-subnav-tab svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.75;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
    }
    .zoho-subnav-tab.active {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #ffffff;
        border-color: transparent;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }
    .zoho-subnav-tab.active:hover {
        background: linear-gradient(135deg, #5a6fd6, #6a4192);
        color: #ffffff;
    }

    /* Mobile hamburger toggle */
    .zoho-subnav-toggle {
        display: none;
        align-items: center;
        justify-content: space-between;
        padding: 0.625rem 0;
        width: 100%;
        cursor: pointer;
        background: none;
        border: none;
        font-size: 0.8125rem;
        font-weight: 600;
        color: #475569;
    }
    .zoho-subnav-toggle svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: transform 0.2s ease;
    }
    .zoho-subnav-toggle.open svg.chevron-icon {
        transform: rotate(180deg);
    }

    .zoho-subnav-toggle-label {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .zoho-subnav-toggle-label svg {
        width: 16px;
        height: 16px;
        stroke: #667eea;
    }

    /* Mobile dropdown */
    .zoho-subnav-dropdown {
        display: none;
        flex-direction: column;
        gap: 2px;
        padding-bottom: 0.5rem;
    }
    .zoho-subnav-dropdown.show {
        display: flex;
    }
    .zoho-subnav-dropdown .zoho-subnav-tab {
        width: 100%;
        min-height: 48px;
        padding: 12px 16px;
        font-size: 14px;
        border-radius: 8px;
    }

    @media (max-width: 768px) {
        .zoho-subnav-tabs {
            display: none;
        }
        .zoho-subnav-toggle {
            display: flex;
        }
    }
</style>

<nav class="zoho-subnav" id="zohoSubnav">
    <div class="zoho-subnav-inner">
        <!-- Mobile toggle -->
        <button class="zoho-subnav-toggle" id="zohoSubnavToggle">
            <span class="zoho-subnav-toggle-label">
                <svg viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                <span id="zohoSubnavCurrentPage">Zoho Books</span>
            </span>
            <svg class="chevron-icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>

        <!-- Mobile dropdown -->
        <div class="zoho-subnav-dropdown" id="zohoSubnavDropdown"></div>

        <!-- Desktop horizontal tabs -->
        <div class="zoho-subnav-tabs" id="zohoSubnavTabs"></div>
    </div>
</nav>
