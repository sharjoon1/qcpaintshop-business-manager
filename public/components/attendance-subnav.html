<!-- Attendance Sub-Navigation Component -->
<style>
    .attendance-subnav {
        background: #ffffff;
        border-bottom: 1px solid #e8ecf1;
        position: sticky;
        top: 0;
        z-index: 999;
        padding: 0;
    }

    .attendance-subnav-inner {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 1rem;
        position: relative;
    }

    /* Desktop: Horizontal scrollable tabs */
    .attendance-subnav-tabs {
        display: flex;
        gap: 4px;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        padding: 0.5rem 0;
    }
    .attendance-subnav-tabs::-webkit-scrollbar { display: none; }

    .attendance-subnav-tab {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 8px;
        font-size: 0.8125rem;
        font-weight: 500;
        color: #64748b;
        text-decoration: none;
        white-space: nowrap;
        transition: all 0.2s ease;
        border: 1px solid transparent;
        flex-shrink: 0;
    }
    .attendance-subnav-tab:hover {
        background: #f1f5f9;
        color: #334155;
    }
    .attendance-subnav-tab svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.75;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
    }
    .attendance-subnav-tab.active {
        background: linear-gradient(135deg, #1B5E3B, #154D31);
        color: #ffffff;
        border-color: transparent;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(27, 94, 59, 0.3);
    }
    .attendance-subnav-tab.active:hover {
        background: linear-gradient(135deg, #154D31, #0D3D23);
        color: #ffffff;
    }

    /* Mobile hamburger toggle */
    .attendance-subnav-toggle {
        display: none;
        align-items: center;
        justify-content: space-between;
        padding: 0.625rem 0;
        width: 100%;
        cursor: pointer;
        background: none;
        border: none;
        font-size: 0.8125rem;
        font-weight: 600;
        color: #475569;
    }
    .attendance-subnav-toggle svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: transform 0.2s ease;
    }
    .attendance-subnav-toggle.open svg.chevron-icon {
        transform: rotate(180deg);
    }

    .attendance-subnav-toggle-label {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .attendance-subnav-toggle-label svg {
        width: 16px;
        height: 16px;
        stroke: #1B5E3B;
    }

    /* Mobile dropdown */
    .attendance-subnav-dropdown {
        display: none;
        flex-direction: column;
        gap: 2px;
        padding-bottom: 0.5rem;
    }
    .attendance-subnav-dropdown.show {
        display: flex;
    }
    .attendance-subnav-dropdown .attendance-subnav-tab {
        width: 100%;
        padding: 8px 12px;
        border-radius: 8px;
    }

    @media (max-width: 768px) {
        .attendance-subnav-tabs {
            display: none;
        }
        .attendance-subnav-toggle {
            display: flex;
        }
    }
</style>

<nav class="attendance-subnav" id="attendanceSubnav">
    <div class="attendance-subnav-inner">
        <!-- Mobile toggle -->
        <button class="attendance-subnav-toggle" id="attendanceSubnavToggle">
            <span class="attendance-subnav-toggle-label">
                <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span id="attendanceSubnavCurrentPage">Attendance</span>
            </span>
            <svg class="chevron-icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>

        <!-- Mobile dropdown -->
        <div class="attendance-subnav-dropdown" id="attendanceSubnavDropdown"></div>

        <!-- Desktop horizontal tabs -->
        <div class="attendance-subnav-tabs" id="attendanceSubnavTabs"></div>
    </div>
</nav>
