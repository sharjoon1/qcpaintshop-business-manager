<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Invoice — Quality Colours</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0fdf4; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .card { background: white; border-radius: 1rem; padding: 2rem; max-width: 400px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
        .logo { width: 56px; height: 56px; background: #1B5E3B; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 1.5rem; }
        h1 { font-size: 1.25rem; font-weight: 700; color: #1a202c; margin-bottom: 0.25rem; }
        .invoice-info { background: #f9fafb; border-radius: 0.75rem; padding: 1rem; margin: 1.25rem 0; text-align: left; }
        .info-row { display: flex; justify-content: space-between; font-size: 0.875rem; color: #6b7280; margin-bottom: 0.5rem; }
        .info-row:last-child { margin-bottom: 0; font-weight: 700; font-size: 1rem; color: #1a202c; }
        .btn { width: 100%; padding: 0.875rem; background: #1B5E3B; color: white; font-size: 1rem; font-weight: 600; border: none; border-radius: 0.75rem; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #154D31; }
        .btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .status-msg { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.5rem; }
        .status-sub { font-size: 0.875rem; color: #6b7280; }
        .success-icon { font-size: 3rem; margin-bottom: 0.5rem; }
        #loader { display: none; }
        #content { display: none; }
        #error { display: none; }
        #success { display: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🎨</div>
    <h1>Quality Colours</h1>
    <p style="color:#6b7280;font-size:0.875rem;margin-bottom:0">Pay Outstanding Invoice</p>

    <div id="loader" style="margin:2rem 0;color:#6b7280">Loading payment details...</div>

    <div id="content">
        <div class="invoice-info">
            <div class="info-row"><span>Invoice #</span><span id="inv-number">—</span></div>
            <div class="info-row"><span>Customer</span><span id="inv-customer">—</span></div>
            <div class="info-row"><span>Amount Due</span><span id="inv-amount">—</span></div>
        </div>
        <button class="btn" id="payBtn" onclick="launchRazorpay()">Pay Now</button>
    </div>

    <div id="error">
        <div class="status-msg" style="color:#dc2626">⚠ Payment Unavailable</div>
        <div class="status-sub" id="error-msg">This payment link is no longer valid.</div>
    </div>

    <div id="success">
        <div class="success-icon">✅</div>
        <div class="status-msg" style="color:#16a34a">Payment Successful!</div>
        <div class="status-sub" id="success-detail">Thank you. Your payment has been recorded.</div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('order');
    let orderData = null;

    async function init() {
        const loader = document.getElementById('loader');
        loader.style.display = 'block';

        if (!orderId) {
            showError('No payment order specified in this link.');
            return;
        }

        try {
            const res = await fetch(`/api/zoho/collections/pay-order/${encodeURIComponent(orderId)}`);
            const data = await res.json();
            loader.style.display = 'none';

            if (!data.success) {
                showError(data.error || 'This payment link is invalid or has expired.');
                return;
            }

            orderData = data;
            document.getElementById('inv-number').textContent = data.order.zoho_invoice_number || '—';
            document.getElementById('inv-customer').textContent = data.order.customer_name || '—';
            document.getElementById('inv-amount').textContent = '₹' + parseFloat(data.order.amount).toLocaleString('en-IN', { minimumFractionDigits: 2 });
            document.getElementById('content').style.display = 'block';
        } catch (e) {
            loader.style.display = 'none';
            showError('Failed to load payment details. Please try again.');
        }
    }

    function showError(msg) {
        document.getElementById('error-msg').textContent = msg;
        document.getElementById('error').style.display = 'block';
    }

    function launchRazorpay() {
        if (!orderData) return;
        const btn = document.getElementById('payBtn');
        btn.disabled = true;
        btn.textContent = 'Opening checkout...';

        const options = {
            key: orderData.key_id,
            amount: Math.round(parseFloat(orderData.order.amount) * 100),
            currency: 'INR',
            name: 'Quality Colours',
            description: `Invoice ${orderData.order.zoho_invoice_number || orderData.order.invoice_id}`,
            order_id: orderId,
            handler: async function(response) {
                try {
                    const verify = await fetch('/api/zoho/collections/pay-verify', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            razorpay_order_id: response.razorpay_order_id,
                            razorpay_payment_id: response.razorpay_payment_id,
                            razorpay_signature: response.razorpay_signature,
                            invoice_id: orderData.order.invoice_id
                        })
                    }).then(r => r.json());

                    document.getElementById('content').style.display = 'none';
                    if (verify.success) {
                        document.getElementById('success-detail').textContent = 'Payment ID: ' + response.razorpay_payment_id;
                        document.getElementById('success').style.display = 'block';
                    } else {
                        showError('Payment received but could not be verified. Please contact us with Payment ID: ' + response.razorpay_payment_id);
                    }
                } catch (e) {
                    document.getElementById('content').style.display = 'none';
                    showError('Verification failed. Please contact us.');
                }
            },
            prefill: { name: orderData.order.customer_name || '' },
            theme: { color: '#1B5E3B' },
            modal: {
                ondismiss: function() {
                    btn.disabled = false;
                    btn.textContent = 'Pay Now';
                }
            }
        };
        const rzp = new Razorpay(options);
        rzp.open();
    }

    init();
</script>
</body>
</html>
